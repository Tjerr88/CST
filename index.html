<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CST Generator V6 - Body Flow</title>
<style>
  :root{
    --bg:#0c1217;
    --bg2:#121c23;
    --surface:rgba(19, 27, 34, 0.9);
    --surface2:rgba(15, 21, 28, 0.92);
    --surface3:rgba(255,255,255,0.035);
    --text:#edf3f7;
    --muted:#9caab8;
    --muted2:#748292;
    --line:rgba(165, 188, 206, 0.13);
    --line-strong:rgba(165, 188, 206, 0.2);
    --acc:#8fb8d8;
    --acc-soft:rgba(143,184,216,0.14);
    --good:#7dcf9b;
    --mid:#d4b16a;
    --rec:#8fb8d8;
    --warn:#e6c87d;
    --danger:#d98b89;
    --shadow:0 18px 48px rgba(0,0,0,.26);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    padding:24px 16px 32px;
    font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(circle at top, rgba(143,184,216,.1), transparent 38%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 48%, #0a0f14 100%);
    color:var(--text);
  }
  .wrap{max-width:1120px; margin:0 auto; display:grid; gap:18px}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:24px;
    padding:18px;
    box-shadow:var(--shadow);
    backdrop-filter: blur(14px);
  }
  .grid{display:grid; grid-template-columns:1fr; gap:18px}
  @media (min-width: 960px){ .grid{ grid-template-columns: minmax(0, 1.28fr) minmax(320px, .72fr); align-items:start; } }
  h1{font-size:28px; line-height:1.05; letter-spacing:-.03em; margin:0}
  h2{font-size:16px; letter-spacing:-.01em; margin:0 0 10px}
  p{margin:0; color:var(--muted); line-height:1.5; font-size:14px}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .btn{
    appearance:none;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.045);
    color:var(--text);
    border-radius:14px;
    padding:12px 16px;
    font-weight:760;
    letter-spacing:.01em;
    cursor:pointer;
    min-height:46px;
    transition:transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .btn:hover{transform:translateY(-1px); border-color:rgba(255,255,255,.14); background:rgba(255,255,255,.065)}
  .btn.primary{border-color: rgba(143,184,216,0.34); background: rgba(143,184,216,0.15); box-shadow: inset 0 1px 0 rgba(255,255,255,.04);}
  .btn.danger{border-color: rgba(217,139,137,0.3); background: rgba(217,139,137,0.1);}
  .btn.good{border-color: rgba(125,207,155,0.34); background: rgba(125,207,155,0.13);}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .btn:focus-visible,
  .score-btn:focus-visible,
  .accordion-header:focus-visible{
    outline:2px solid var(--acc);
    outline-offset:2px;
  }
  .pill{
    display:inline-flex;
    gap:6px;
    align-items:center;
    padding:7px 11px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.03);
    color:var(--muted);
    font-size:12px;
  }
  .pill strong{color:var(--text)}
  .exercise{
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.015));
    border-radius:18px;
    padding:14px 15px;
    display:flex; gap:10px; justify-content:space-between; align-items:flex-start;
  }
  .ex-left{display:grid; gap:3px}
  .ex-title{font-weight:780; letter-spacing:-.01em}
  .ex-meta{color:var(--muted); font-size:12px; line-height:1.45}
  .label{color:var(--muted2); font-size:12px; text-transform:uppercase; letter-spacing:.08em}
  .time{font-variant-numeric: tabular-nums; font-size:64px; font-weight:800; letter-spacing:-.04em; line-height:.95;}
  .stage-title{font-size:22px; font-weight:780; letter-spacing:-.02em; margin-bottom:6px;}
  .hr{height:1px; background:linear-gradient(90deg, transparent, var(--line-strong), transparent); margin:18px 0;}
  .small{font-size:12px; color:var(--muted); line-height:1.5}
  .gate-grid{display:grid; gap:14px}
  .gate-row{display:grid; gap:8px}
  .score-row{display:flex; gap:8px; flex-wrap:wrap}
  .score-btn{
    appearance:none;
    width:48px; height:42px; display:inline-flex; justify-content:center; align-items:center;
    border-radius:14px; border:1px solid rgba(255,255,255,.09);
    background:rgba(255,255,255,.05); color:var(--text);
    font-weight:800; cursor:pointer; user-select:none;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .score-btn.active{
    border-color: rgba(143,184,216,0.42);
    background: linear-gradient(180deg, rgba(143,184,216,0.22), rgba(143,184,216,0.1));
    transform: translateY(-1px);
  }
  .score-label{margin-top:6px; min-height:18px; font-size:12px; color:var(--muted); font-weight:600}
  .total{
    display:flex; gap:10px; align-items:center; justify-content:space-between;
    border:1px solid var(--line); background:var(--surface2); border-radius:18px; padding:14px 15px;
  }
  .total .n{font-size:32px; font-weight:820; font-variant-numeric: tabular-nums; letter-spacing:-.03em}
  .badge{
    padding:7px 11px; border-radius:999px; font-size:12px; font-weight:800;
    border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--muted);
  }
  .badge.good{ color: rgba(125,207,155,1); border-color: rgba(125,207,155,.28); background: rgba(125,207,155,.09); }
  .badge.mid{ color: rgba(212,177,106,1); border-color: rgba(212,177,106,.3); background: rgba(212,177,106,.09); }
  .badge.rec{ color: rgba(143,184,216,1); border-color: rgba(143,184,216,.32); background: rgba(143,184,216,.11); }

  .accordion{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:20px;
    overflow:hidden;
    margin-top:12px;
    transition:border-color .2s ease, background .2s ease;
  }
  .accordion-header{
    width:100%;
    appearance:none;
    border:0;
    background:transparent;
    color:var(--text);
    padding:15px 16px;
    font-weight:760;
    text-align:left;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .accordion-header:hover,
  .accordion-header:focus-visible{ background:rgba(255,255,255,.025); }
  .accordion-header::after{
    content:"\25B6";
    color:var(--muted);
    transition:transform .2s ease;
    flex:0 0 auto;
  }
  .accordion.active > .accordion-header::after{
    transform:rotate(90deg);
  }
  .accordion-content{
    display:none;
    padding:0 14px 14px;
    border-top:1px solid var(--line);
  }
  .accordion.active > .accordion-content{
    display:block;
  }

  .timeline{
    display:grid;
    gap:10px;
    margin-top:16px;
  }
  .stage-pill{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    border-radius:16px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.025);
    color:var(--muted);
    font-size:13px;
  }
  .stage-pill.active{
    border-color: rgba(143,184,216,0.32);
    background: rgba(143,184,216,0.11);
    color:var(--text);
  }
  .stage-pill.done{
    border-color: rgba(125,207,155,0.24);
    background: rgba(125,207,155,0.08);
    color:var(--text);
  }
  .beep-pill{
    color:var(--warn);
    border-color: rgba(230,200,125,.25);
    background: rgba(230,200,125,.08);
  }
  .mt-10{margin-top:10px}
  .mt-12{margin-top:12px}
  .mb-10{margin-bottom:10px}
  .mb-12{margin-bottom:12px}
  .stack-10{display:grid; gap:12px}
  .stack-10.mt-12{margin-top:12px}


  .intu-item{
    border:1px solid var(--line);
    background:rgba(255,255,255,.022);
    border-radius:18px;
    overflow:hidden;
  }
  .intu-summary{
    list-style:none;
    cursor:pointer;
    padding:14px 15px;
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:flex-start;
  }
  .intu-summary::-webkit-details-marker{display:none}
  .intu-summary::after{
    content:"\25B6";
    color:var(--muted);
    transition:transform .2s ease;
    flex:0 0 auto;
    margin-top:2px;
  }
  .intu-item[open] .intu-summary::after{transform:rotate(90deg)}
  .intu-summary:hover,
  .intu-summary:focus-visible{background:rgba(255,255,255,.025); outline:none}
  .intu-body{
    border-top:1px solid var(--line);
    padding:12px 15px 15px;
    color:var(--muted);
    font-size:12px;
    line-height:1.6;
  }
  .finish-row{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:16px}
  .btn.finish{border-color: rgba(125,207,155,0.34); background: rgba(125,207,155,0.13);}
  .btn.finish[disabled]{opacity:.55}
  .tabbar{display:inline-flex; gap:8px; flex-wrap:wrap; margin-top:16px; padding:6px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.02)}
  .tab{appearance:none; border:1px solid transparent; background:transparent; color:var(--muted); border-radius:999px; padding:9px 14px; font-weight:760; cursor:pointer; transition:background .18s ease, color .18s ease, border-color .18s ease}
  .tab.active{color:var(--text); border-color: rgba(143,184,216,0.22); background: rgba(143,184,216,0.12);}
  .panel{display:none}
  .panel.active{display:block}
  .settings-grid{display:grid; grid-template-columns:1fr; gap:18px}
  @media (min-width: 960px){ .settings-grid{ grid-template-columns: 1fr 1fr; } }
  .setting-list{display:grid; gap:14px}
  .kv{display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center}
  .kv select{width:220px; max-width:100%; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:var(--text)}
  .toggle-list{display:grid; gap:10px}
  .toggle-item{display:flex; justify-content:space-between; gap:12px; align-items:center; padding:12px 14px; border:1px solid var(--line); border-radius:16px; background:rgba(255,255,255,.02)}
  .toggle-item input{accent-color:#7aa7ff; width:18px; height:18px}
  .settings-note{font-size:12px; color:var(--muted); line-height:1.55}
  .hidden-advanced{display:none}
  .hidden-advanced.active{display:grid; gap:10px}
  .topbar-card{
    padding:24px;
    background:
      radial-gradient(circle at top right, rgba(143,184,216,.12), transparent 30%),
      linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)),
      var(--surface);
  }
  .topbar-head{display:grid; gap:8px}
  .eyebrow{font-size:12px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted2)}
  .hero-copy{max-width:720px; color:var(--muted)}
  .toolbar{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:14px;
    margin-top:18px;
  }
  .toolbar-actions,
  .toolbar-status{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  .status-optional{display:inline-flex}
  #leftCard,
  #rightCard,
  #settingsCstCard,
  #settingsBfCard{min-height:100%}
  #rightCard{
    position:sticky;
    top:18px;
    background:
      linear-gradient(180deg, rgba(143,184,216,.08), rgba(255,255,255,.02) 24%),
      var(--surface);
  }
  .timer-shell{
    display:grid;
    gap:16px;
  }
  .timer-hero{
    border:1px solid var(--line);
    border-radius:22px;
    padding:18px;
    background:linear-gradient(180deg, rgba(143,184,216,.12), rgba(255,255,255,.02));
  }
  .timer-actions{display:flex; flex-wrap:wrap; gap:10px}
  .timer-note{padding:14px 15px; border-radius:16px; border:1px solid var(--line); background:rgba(255,255,255,.02)}
  .card h2 + .small{margin-top:-2px}
  @media (max-width: 959px){
    body{padding:10px 10px calc(96px + env(safe-area-inset-bottom))}
    .wrap{gap:12px}
    .card{padding:14px; border-radius:20px}
    .topbar-card{padding:14px 14px 12px}
    .topbar-head{gap:6px}
    .eyebrow{font-size:11px}
    .hero-copy{display:none}
    h1{font-size:22px}
    h2{font-size:15px}
    .toolbar{gap:12px; margin-top:14px}
    .toolbar-actions{width:100%}
    .toolbar-actions .btn{flex:1 1 0}
    .toolbar-status{gap:8px}
    .status-optional{display:none}
    .pill{padding:6px 9px; font-size:11px}
    .tabbar{
      display:flex;
      width:100%;
      margin-top:12px;
      overflow:auto;
      scrollbar-width:none;
    }
    .tabbar::-webkit-scrollbar{display:none}
    .tab{flex:1 0 auto; text-align:center; padding:10px 12px}
    .grid{gap:12px}
    #rightCard{
      position:sticky;
      top:8px;
      order:-1;
      z-index:5;
      border-color:rgba(143,184,216,.18);
    }
    #leftCard{order:1}
    .time{font-size:48px}
    .stage-title{font-size:19px}
    .timer-shell{gap:12px}
    .timer-hero{padding:14px 15px; border-radius:18px}
    .timer-actions{
      position:sticky;
      bottom:calc(10px + env(safe-area-inset-bottom));
      z-index:3;
      margin:0 -4px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(12,18,23,.92);
      backdrop-filter:blur(14px);
      box-shadow:0 12px 30px rgba(0,0,0,.28);
    }
    .timer-actions .btn{flex:1 1 calc(50% - 6px); min-height:48px}
    .timer-note{display:none}
    .accordion{border-radius:18px}
    .accordion-header{padding:13px 14px; align-items:flex-start}
    .accordion-content{padding:0 12px 12px}
    .exercise,
    .intu-item,
    .total,
    .toggle-item{border-radius:16px}
    .exercise{padding:12px 13px}
    .finish-row{
      position:sticky;
      bottom:calc(10px + env(safe-area-inset-bottom));
      z-index:2;
      margin:16px -4px 0;
      padding:10px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(12,18,23,.92);
      backdrop-filter:blur(14px);
      box-shadow:0 12px 30px rgba(0,0,0,.22);
    }
    .finish-row .btn{flex:1 1 calc(50% - 6px); min-height:48px}
    .finish-row .small{width:100%; font-size:11px}
    .score-row{display:grid; grid-template-columns:repeat(3, minmax(0, 1fr))}
    .score-btn{width:100%; height:44px}
    .kv{grid-template-columns:1fr}
    .kv select{width:100%}
  }
  #confettiLayer{position:fixed; inset:0; pointer-events:none; z-index:9999}

</style>
</head>
<body>
<canvas id="confettiLayer"></canvas>

<div class="wrap">
  <div class="card topbar-card">
    <div class="topbar-head">
      <div class="eyebrow">CST Session Flow</div>
      <h1>CST Generator V6 - Body Flow</h1>
      <p class="hero-copy">Rustiger overzicht voor je dagtraining: dezelfde inhoud, dezelfde opbouw, maar met meer focus op wat nu belangrijk is.</p>
    </div>
    <div class="toolbar">
      <div class="toolbar-actions">
        <button id="btnMain" class="btn primary">Start</button>
        <button id="btnReset" class="btn danger">Reset day</button>
      </div>
      <div class="toolbar-status">
        <span id="modePill" class="pill">Mode: <strong>-</strong></span>
        <span id="dayPill" class="pill">Today: <strong>new</strong></span>
        <span id="wakePill" class="pill status-optional">Wake Lock: <strong>off</strong></span>
        <span class="pill beep-pill status-optional">Beeps: <strong>3-2-1 + switch + done</strong></span>
      </div>
    </div>
    <div class="tabbar">
      <button type="button" class="tab active" data-tab="today">Today</button>
      <button type="button" class="tab" data-tab="settings">Settings</button>
    </div>
  </div>

  <section id="panel-today" class="panel active">
    <div class="grid">
      <div id="leftCard" class="card"></div>
      <div id="rightCard" class="card"><div id="rightInner"></div></div>
    </div>
  </section>

  <section id="panel-settings" class="panel">
    <div class="settings-grid">
      <div id="settingsCstCard" class="card"></div>
      <div id="settingsBfCard" class="card"></div>
    </div>
  </section>
</div>

<script>
(() => {
  const LS_DAY = "cst_day_v60";
  const LS_LAST = "cst_last_v60";
  const LS_DAY_LEGACY = "cst_day_v38";
  const LS_LAST_LEGACY = "cst_last_v38";
  const LS_DAY_LEGACY_2 = "cst_day_v37";
  const LS_LAST_LEGACY_2 = "cst_last_v37";
  const LS_COMPLETED = "cst_completed_v60";
  const LS_COMPLETED_LEGACY = "cst_completed_v38";
  const LS_PROGRESS = "cst_progress_v60";

  const gateDef = [
    { key:'soreness', label:'Soreness / Recovery', choices:['Pain','Restricted','Stiff','Slightly stiff','Loose','Fresh'] },
    { key:'energy',   label:'Energy / Stress',   choices:['Empty','Heavy','Tired','Neutral','Good','Sharp'] },
    { key:'sleep',    label:'Sleep quality',     choices:['Very poor','Poor','Interrupted','OK','Good','Restorative'] },
  ];

  const intu = [
    {
      title:"Loose Noose",
      reps:"3x per side",
      description:"Drop your ear toward your shoulder, pull the opposite shoulder down, and gently lift your jaw. Melt into the side of the neck, then repeat on both sides."
    },
    {
      title:"Neck Nod Mobility Drill",
      reps:"3x per side",
      description:"Turn your head to one side, tip the back of the head toward the opposite shoulder without untwisting, let the shoulder drop, then look up. Keep the motion small and smooth."
    },
    {
      title:"Shoulder Roll",
      reps:"3x per shoulder",
      description:"Hold one wrist behind your back, lift that shoulder, roll it backward, and turn the thumb outward. Keep the elbow straight and do not twist your torso."
    },
    {
      title:"Arm Screw Mobility Drill",
      reps:"3x per side",
      description:"Lift the arms to shoulder height, shrug and roll one shoulder forward while sinking slightly to that side. Let the opposite arm rotate the other way as if you are wringing out tension."
    },
    {
      title:"Hitch Hiker Mobility Drill",
      reps:"5 circles per arm",
      description:"Keep the upper arm level, start with the thumb pointing toward your nose, then rotate it outward and spiral the forearm around until the elbow locks. Reverse the path on the way back."
    },
    {
      title:"Wrist Chopper Drill",
      reps:"5 reps",
      description:"Raise your arms on a diagonal as if holding chopper handlebars. Lift the wrists, draw the knuckles toward the forearm, pause briefly, then press the palms forward."
    },
    {
      title:"Jellyfish Drill",
      reps:"5 reps per hand",
      description:"Make a tight fist, actively press through the knuckles, then fully open the fingers and wave them back toward the forearm. Release all tension at the end of each rep."
    },
    {
      title:"Okay Cone",
      reps:"5 reps up and down",
      description:"Form an okay sign, stack the fingertips, spread and extend the fingers fully, then reshape the hand into a cone. Move smoothly between open and closed positions."
    },
    {
      title:"Thoracic Circle Mobility Drill",
      reps:"5 clockwise + 5 counter-clockwise",
      description:"Lift the chest, slide the ribs to the side, round the mid-back behind you, move through the other side, and return to tall posture. Make big, calm circles from the thoracic spine."
    },
    {
      title:"Taiji Twist",
      reps:"10x per side",
      description:"Rotate loosely from the trunk to the right and left while the arms swing freely and tap the ribs and sides. Stay relaxed, rhythmic, and unforced."
    },
    {
      title:"Hula Hoop Mobility Drill",
      reps:"5 clockwise + 5 counter-clockwise",
      description:"Draw a large circle with the pelvis by tucking, lifting one hip, arching, lifting the other hip, and returning to center. Think of a slow hula-hoop motion from the hips."
    },
    {
      title:"Lumbar Circle Mobility Drill",
      reps:"5 clockwise + 5 counter-clockwise",
      description:"With soft knees, hang forward, rotate through one side, extend through the back, travel to the other side, and return to the forward fold. Let the lower back move in a slow, smooth circle."
    },
    {
      title:"Hip Drill",
      reps:"3x per side",
      description:"Stand on one leg and swing the other straight leg forward, out to the side, and behind you with an active foot and a long knee. Create a controlled hip circle in the air."
    },
    {
      title:"Knee Circle Drill",
      reps:"10 per direction",
      description:"Lift the thigh to hip height, extend the lower leg, pull the toes toward the shin, and rotate from the hip and knee so the heel moves outward. Perform controlled rotations both ways."
    },
    {
      title:"Ankle Roll Mobility Drill",
      reps:"3 reps per foot",
      description:"Roll across the outside of the foot toward the big toe, let the knee and heel turn with it, curl the toes, then return under control. Move slowly and with clear ankle intent."
    }
  ];

const CLUB_EXERCISES = [
  { name:"Front Swing", bucket:"Rhythmic", subcategory:"swing", start:"ready", end:"ready", modes:["single","double"] },
  { name:"Two-Handed Front Swing", bucket:"Rhythmic", subcategory:"swing", start:"ready", end:"ready", modes:["2h"] },
  { name:"Side Swing", bucket:"Rhythmic", subcategory:"swing", start:"ready", end:"ready", modes:["single","double"] },
  { name:"Side Semi Circle Swing", bucket:"Rhythmic", subcategory:"swing", start:"ready", end:"ready", modes:["single","double"] },
  { name:"Pirouette Swing", bucket:"Rhythmic", subcategory:"swing", start:"ready", end:"ready", modes:["single","double"] },

function getClubExerciseDescription(name){
  const raw = String(name || "");
  const normalized = raw
    .replace(/[â€“â€”]/g, "-")
    .replace(/\s+/g, " ")
    .trim();
  return CLUB_EXERCISE_DESCRIPTIONS[raw]
    || CLUB_EXERCISE_DESCRIPTIONS[normalized]
    || CLUB_EXERCISE_DESCRIPTIONS[normalized.replace(/^Two Handed\b/, "Two-Handed")]
    || "No short description has been added for this exercise yet.";
}

function renderClubExerciseAccordionCard(x, idx){
  const title = `${idx + 1}. ${cleanText(x.exercise)}`;
  const meta = `${cleanText(x.bucketLabel || x.bucket)} | ${cleanText(x.subcategory)}`;
  const description = getClubExerciseDescription(x.exercise);
  return `<details class="intu-item club-exercise-item">
    <summary class="intu-summary">
      <div class="ex-left">
        <div class="ex-title">${title}</div>
        <div class="ex-meta">${meta}</div>
      </div>
      <div class="pill">Club</div>
    </summary>
    <div class="intu-body">${cleanText(description)}</div>
  </details>`;
}

  function dateKeyForOffset(days){
    const d = new Date();
    d.setHours(12,0,0,0);
    d.setDate(d.getDate() + days);
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function todayKey(){ return dateKeyForOffset(0); }
  function yesterdayKey(){ return dateKeyForOffset(-1); }
  function loadJSON(k){ try{ const r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch { return null; } }
  function saveJSON(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
  function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function computeBand(total){
    if(total >= 12) return { band:'normal', label:'12-15', cls:'good', minutes:null, intuOnly:false, useProgression:true };
    if(total >= 9)  return { band:'15', label:'9-11', cls:'mid', minutes:15, intuOnly:false, useProgression:false };
    return { band:'intu-only', label:'0-8', cls:'rec', minutes:0, intuOnly:true, useProgression:false };
  }
  function getEffectiveMainDuration(total, progress){
    const band = computeBand(total);
    if(band.intuOnly) return 0;
    if(band.useProgression) return getCurrentDurationMinutes(progress);
    return band.minutes || 15;
  }
  function getBandDescription(total, progress){
    const band = computeBand(total);
    if(band.intuOnly) return 'Intu only';
    if(band.useProgression) return `Normal session (${getCurrentDurationMinutes(progress)} min from progression)`;
    return `15 min fallback`;
  }
  function formatModeLabel(mode){
    if(mode === "INTU ONLY") return "Intu only";
    if(mode === "CLUBBELL DAY") return "Clubbell day";
    if(mode === "BODY FLOW DAY") return "Body Flow day";
    return mode || "-";
  }

  function fmt(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  }
  function fmtMin(sec){ return sec ? Math.round(sec/60) + " min" : "-"; }
  function cleanText(value){
    return String(value ?? "")
      .replaceAll("Ã¢â‚¬â€", "-")
      .replaceAll("Ã¢â‚¬Â¢", "â€¢")
      .replace(/\bOke\b/g, "OK")
      .replace(/\bfull-body\b/gi, "full body")

      .replace(/\bper schouder\b/gi, "per shoulder")

      .replace(/\bper hand\b/gi, "per hand")
      .replace(/\bop en neer\b/gi, "up and down")
      .replace(/\bper richting\b/gi, "per direction")
      .replace(/\bper voet\b/gi, "per foot")

  function getBodyFlowMoveCount(flow){
    if(!flow?.steps?.length) return 0;
    return flow.steps.filter(step => {
      const moveId = String(step.moveId || "");
      if(step.isReturn) return false;
      if(moveId.startsWith("SET_")) return false;
      if(moveId.startsWith("RESET_")) return false;
      if(moveId.startsWith("STRUCTURE_")) return false;
      return true;
    }).length;
  }

  function getBodyFlowLengthLabel(flow){
    const requested = flow?.requestedLength;
    return requested === "random" ? "Random" : String(requested ?? flow?.length ?? "-");
  }

  function getBodyFlowStructureCount(flow){
    if(!flow?.steps?.length) return 0;
    return flow.steps.filter(step => {
      const moveId = String(step.moveId || "");
      return moveId.startsWith("SET_") || moveId.startsWith("RESET_") || moveId.startsWith("STRUCTURE_") || step.isReturn;
    }).length;
  }

  
function getDefaultLastState(){
    return {
      lastClubType:null,
      lastClubTypeIndex:-1,
      lastClubExercisesByType:{ single:{}, double:{}, "2h":{} }
    };
  }

  function removeStorageKeys(keys){
    keys.forEach(key => localStorage.removeItem(key));
  }

  function readFirstJSON(keys){
    for(const key of keys){
      const value = loadJSON(key);
      if(value) return value;
    }
    return null;
  }

  function normalizeSession(day){
    if(!day || typeof day !== "object") return day;
    if(day.dayType === "standalone") day.dayType = "bodyflow";
    if(day.mode === "STAND-ALONE FLOW DAY") day.mode = "BODY FLOW DAY";
    if(day.activeFlow && !day.bodyFlow) day.bodyFlow = day.activeFlow;
    delete day.activeFlow;
    if(day.blockTimes?.active && !day.blockTimes?.bodyFlow){
      day.blockTimes.bodyFlow = day.blockTimes.active;
    }
    if(day.blockTimes && "active" in day.blockTimes){
      delete day.blockTimes.active;
    }
    if(Array.isArray(day.stages)){
      day.stages = day.stages.map(stage => {
        if(stage?.key === "active"){
          return {
            ...stage,
            key:"bodyflow",
            label:String(stage.label || "").replace(/^Stand-alone flow/i, "Body Flow")
          };
        }
        return stage;
      });
    }
    return day;
  }

  function normalizeCompletedState(state){
    if(!state || typeof state !== "object") return state;
    if(state.dayType === "standalone") state.dayType = "bodyflow";
    return state;
  }

  function isSessionLegacyShape(day){
    if(!day || typeof day !== "object") return false;
    return day.dayType === "standalone"
      || day.mode === "STAND-ALONE FLOW DAY"
      || !!day.activeFlow
      || !!day.blockTimes?.active
      || (Array.isArray(day.stages) && day.stages.some(stage => stage?.key === "active"));
  }

  function loadDay(){
    if(cachedDay?.day === todayKey()) return cachedDay;
    const rawDay = readFirstJSON(DAY_KEYS);
    const shouldPersistMigration = isSessionLegacyShape(rawDay);
    const day = normalizeSession(rawDay);
    if(rawDay && day && shouldPersistMigration && day.day === todayKey()){
      saveJSON(LS_DAY, day);
    }
    cachedDay = day && day.day === todayKey() ? day : null;
    return cachedDay;
  }
  function saveDay(day){
    cachedDay = normalizeSession(day);
    saveJSON(LS_DAY, cachedDay);
  }
  function loadLast(){
    if(cachedLast) return { ...cachedLast };
    cachedLast = {
      ...getDefaultLastState(),
      ...(readFirstJSON(LAST_KEYS) || {})
    };
    return { ...cachedLast };
  }
  function saveLast(v){
    cachedLast = { ...getDefaultLastState(), ...v };
    saveJSON(LS_LAST, cachedLast);
  }
  function loadCompleted(){
    if(cachedCompleted !== null) return cachedCompleted;
    const rawCompleted = readFirstJSON(COMPLETED_KEYS);
    cachedCompleted = normalizeCompletedState(rawCompleted);
    if(rawCompleted?.dayType === "standalone" && cachedCompleted){
      saveJSON(LS_COMPLETED, cachedCompleted);
    }
    return cachedCompleted;
  }
  function saveCompleted(v){
    cachedCompleted = normalizeCompletedState(v);
    saveJSON(LS_COMPLETED, cachedCompleted);
  }
  function loadProgressCached(){
    if(cachedProgress !== null) return cachedProgress;
    cachedProgress = getProgress();
    return cachedProgress;
  }
  function saveProgressCached(v){
    cachedProgress = saveProgress(v);
    return cachedProgress;
  }
  function getStageSecondsLeft(session, now = Date.now()){
    if(!session) return 0;
    if(session.isRunning && session.currentStageEndsAt){
      return Math.max(0, Math.ceil((session.currentStageEndsAt - now) / 1000));
    }
    return Math.max(0, Number(session.currentStageLeft) || 0);
  }
  function hydrateStageTime(session, now = Date.now()){
    if(!session) return session;
    session.currentStageLeft = getStageSecondsLeft(session, now);
    return session;
  }
  function clearStageClock(session){
    if(!session) return session;
    session.currentStageStartedAt = null;
    session.currentStageEndsAt = null;
    return session;
  }
  function armStageClock(session, now = Date.now()){
    if(!session) return session;
    session.currentStageStartedAt = now;
    session.currentStageEndsAt = now + (getStageSecondsLeft(session, now) * 1000);
    return session;
  }

  function computeTrainingDayType(){
    const bfSettings = getBFSettings();
    const completed = loadCompleted();
    if(!completed || completed.day !== yesterdayKey()) return 'clubbell';
    if(!bfSettings.enableStandalone) return 'clubbell';
    return completed.dayType === 'clubbell' ? 'bodyflow' : 'clubbell';
  }

  function nextFullClubType(lastState = loadLast()){
    const cstSettings = getCSTSettings();
    const enabledTypes = CLUB_TYPE_SEQUENCE.filter(type => cstSettings.clubTypes?.[type]);
    if(!enabledTypes.length) return { type:"single", index:0 };

    let previousIndex = Number.isInteger(lastState.lastClubTypeIndex) ? lastState.lastClubTypeIndex : -1;
    if(previousIndex < 0 || previousIndex >= CLUB_TYPE_SEQUENCE.length){
      previousIndex = CLUB_TYPE_SEQUENCE.lastIndexOf(lastState.lastClubType || "");
    }

    for(let offset = 1; offset <= CLUB_TYPE_SEQUENCE.length; offset += 1){
      const idx = (Math.max(-1, previousIndex) + offset) % CLUB_TYPE_SEQUENCE.length;
      const type = CLUB_TYPE_SEQUENCE[idx];
      if(cstSettings.clubTypes?.[type]) return { type, index:idx };
    }

    return { type:enabledTypes[0], index:CLUB_TYPE_SEQUENCE.indexOf(enabledTypes[0]) };
  }
  function generateClubExercises(clubType, progress, lastState = loadLast()){
    const phase = getCurrentPhase(progress);
    const pattern = getCurrentPattern(progress);
    const sequence = [];
    const lastExerciseMap = getLastExerciseMap(lastState, clubType);

    BUCKETS.forEach(bucket => {
      const needed = pattern[bucket] || 0;
      const subcategories = drawSubcategories(progress, bucket, needed);
      subcategories.forEach(subcategory => {
        const exerciseKey = `${bucket}|${subcategory}`;
        const exercise = pickExerciseForSubcategory(bucket, subcategory, clubType, lastExerciseMap[exerciseKey] || null);
        if(exercise){
          sequence.push({ bucket, bucketLabel:getBucketLabel(bucket), subcategory, exercise:exercise.name, modes:exercise.modes });
        }
      });
    });

    return {
      phaseName:phase.name,
      pattern,
      sequence,
      flow: sequence.map(x => x.exercise).join(" -> ")
    };
  }


  function buildStages(session){
    const stages = [];
    if(session.dayType === 'clubbell'){
      stages.push({ key:'club', label:`Clubbell | ${fmtMin(session.blockTimes.club)}`, seconds:session.blockTimes.club });
      stages.push({ key:'decomp', label:`Decompress | ${fmtMin(session.blockTimes.decomp)}`, seconds:session.blockTimes.decomp, manualStart:true });
    } else if(session.dayType === 'bodyflow'){
      stages.push({ key:'bodyflow', label:`Body Flow | ${fmtMin(session.blockTimes.bodyFlow)}`, seconds:session.blockTimes.bodyFlow });
      stages.push({ key:'decomp', label:`Decompress | ${fmtMin(session.blockTimes.decomp)}`, seconds:session.blockTimes.decomp, manualStart:true });
    }
    return stages;
  }

  function generateSession(mode, total){
    const last = loadLast();
    const band = computeBand(total);
    const dayType = computeTrainingDayType();
    let progress = loadProgressCached();

    const session = {
      day: todayKey(),
      total,
      modeRequested: mode,
      mode: band.intuOnly ? 'INTU ONLY' : (dayType === 'clubbell' ? 'CLUBBELL DAY' : 'BODY FLOW DAY'),
      dayType,
      intuOnly: band.intuOnly,
      countsTowardProgression: false,
      delayedPlannedDay: band.intuOnly,
      intu: intu.slice(),
      club: null,
      bodyFlow: null,
      decompFlow: null,
      blockTimes: { intu: 8 * 60, club: 0, bodyFlow: 0, decomp: 0 },
      stages: [],
      currentStageIndex: 0,
      currentStageLeft: 0,
      currentStageStartedAt: null,
      currentStageEndsAt: null,
      isRunning: false,
      lastCountdownBeep: null,
      completed: false,
      completedAt: null,
      settingsUsed:{ cst:getCSTSettings(), bodyFlow:getBFSettings() },
      progressSnapshot:{
        phaseIndex:progress.phaseIndex,
        phaseName:getCurrentPhase(progress).name,
        sessionInPhase:progress.sessionInPhase,
        durationMinutes:getEffectiveMainDuration(total, progress),
        awaitingDecision:progress.awaitingDecision,
        pattern:getCurrentPattern(progress)
      }
    };

    if(band.intuOnly){
      saveLast(last);
    } else if(dayType === 'clubbell'){
      const clubTypePick = nextFullClubType(last);
      const clubType = clubTypePick.type;
      const clubPlan = generateClubExercises(clubType, progress, last);
      const bfSettings = getBFSettings();
      const decompLevel = bfSettings.decompComplexity === "simple" ? 1 : 2;
      const decompSequence = buildBodyFlowSequence(`${todayKey()}|body-flow-decompress`, {
        kind:"decompress",
        level:decompLevel,
        length: bfSettings.decompComplexity === "simple" ? 4 : 5,
        startBase:"random",
        includeAdvanced:false
      });
      session.club = {
        allowedClubTypes:Object.entries(session.settingsUsed.cst.clubTypes).filter(([,v]) => v).map(([k]) => k),
        clubType,
        clubTypeIndex:clubTypePick.index,
        phaseName:clubPlan.phaseName,
        pattern:clubPlan.pattern,
        sessionNumber:(progress.sessionInPhase || 0) + 1,
        sequence: clubPlan.sequence,
        flow: clubPlan.flow
      };
      session.decompFlow = {
        name: "Body-Flow Decompression",
        focus: `${bfLevelLabel(decompSequence.level)} | short unbinding chain`,
        use: "After Clubbell: move calmly through this Body-Flow chain. Breathe, soften excess tension, and do not turn it into conditioning.",
        bagType: 'Body-Flow',
        ...decompSequence
      };
      session.blockTimes.club = getEffectiveMainDuration(total, progress) * 60;
      session.blockTimes.decomp = 5 * 60;
      session.countsTowardProgression = !!band.useProgression;
      // Do not commit Clubbell type rotation or exercise history here.
      // Reset day may regenerate today's plan; the rotation only advances on Finish.
      saveLast(last);
      saveProgressCached(progress);
    } else {
      const bfSettings = getBFSettings();
      const capLevel = total < 12 ? Math.min(2, bfSettings.practiceLevel) : bfSettings.practiceLevel;
      const bodyFlowSequence = buildBodyFlowSequence(`${todayKey()}|body-flow-practice`, {
        kind:"practice",
        level:capLevel,
        length: bfSettings.practiceLength,
        startBase: bfSettings.startBase,
        includeAdvanced: bfSettings.includeAdvanced
      });
      const decompSequence = buildBodyFlowSequence(`${todayKey()}|body-flow-finish`, {
        kind:"decompress",
        level: bfSettings.decompComplexity === "simple" ? 1 : 2,
        length: bfSettings.decompComplexity === "simple" ? 4 : 5,
        startBase:"random",
        includeAdvanced:false
      });
      session.bodyFlow = {
        name: "Body-Flow Practice",
        focus: `${bfLevelLabel(bodyFlowSequence.level)} | structure -> transition -> chain`,
        use: "Body-Flow day: follow the sequence as written. Start from the structure, use only the listed transitions, and let breath decide the pace.",
        bagType: 'Body-Flow',
        ...bodyFlowSequence
      };
      session.decompFlow = {
        name: "Body-Flow Decompression",
        focus: `${bfLevelLabel(decompSequence.level)} | short settling chain`,
        use: "Finish with this short Body-Flow chain. Make it slower and softer than the main practice.",
        bagType: 'Body-Flow',
        ...decompSequence
      };
      session.blockTimes.bodyFlow = getEffectiveMainDuration(total, progress) * 60;
      session.blockTimes.decomp = 5 * 60;
      saveLast(last);
    }

    session.stages = buildStages(session);
    session.currentStageLeft = session.stages.length ? session.stages[0].seconds : 0;

    saveDay(session);
    return session;
  }

  function bindAccordions(){
    const getDirectAccordionHeader = (accordion) => Array.from(accordion.children).find(el => el.classList?.contains('accordion-header')) || null;
    const getDirectAccordionContent = (accordion) => Array.from(accordion.children).find(el => el.classList?.contains('accordion-content')) || null;
    const getSiblingAccordions = (accordion) => Array.from(accordion?.parentElement?.children || []).filter(el => el.classList?.contains('accordion'));

    leftCard.querySelectorAll('.accordion').forEach((accordion, index) => {
      const header = getDirectAccordionHeader(accordion);
      const content = getDirectAccordionContent(accordion);
      if(header && content){
        const contentId = `accordion-content-${index}`;
        content.id = contentId;
        header.setAttribute("aria-controls", contentId);
        header.setAttribute("aria-expanded", String(accordion.classList.contains('active')));
      }
    });

    if(accordionsBound) return;
    accordionsBound = true;

    leftCard.addEventListener('click', (e) => {
      const btn = e.target.closest('.accordion-header');
      if(!btn || !leftCard.contains(btn)) return;
      e.stopPropagation();
      const parent = btn.closest('.accordion');
      if(!parent) return;
      const isOpen = parent.classList.contains('active');
      getSiblingAccordions(parent).forEach(acc => {
        acc.classList.remove('active');
        const header = getDirectAccordionHeader(acc);
        if(header) header.setAttribute("aria-expanded", "false");
      });
      if(!isOpen){
        parent.classList.add('active');
        btn.setAttribute("aria-expanded", "true");
      }
    });
  }

  function syncRightPanel(s){
    if(!s){
      renderRightNone();
      return;
    }

    const current = getCurrentStage(s);
    const next = s.stages[s.currentStageIndex + 1] || null;
    const currentLabel = document.getElementById("currentStageLabel");
    const timeDisplay = document.getElementById("timeDisplay");
    const playPauseBtn = document.getElementById("btnPlayPause");
    const nextStageMeta = document.getElementById("nextStageMeta");

    if(!currentLabel || !timeDisplay || !playPauseBtn || !nextStageMeta){
      renderRightPanel(s);
      return;
    }

    hydrateStageTime(s);
    currentLabel.textContent = current ? current.label : "-";
    timeDisplay.textContent = fmt(s.currentStageLeft || 0);
    playPauseBtn.textContent = s.isRunning ? "Pause" : ((current && current.manualStart) ? "Start decompression" : "Start");
    nextStageMeta.textContent = next ? (next.manualStart ? `${next.label} | starts when you press Start` : next.label) : "You are done after this block.";

    rightInner.querySelectorAll(".stage-pill").forEach((pill, idx) => {
      pill.classList.remove("active", "done");
      if(idx < s.currentStageIndex) pill.classList.add("done");
      else if(idx === s.currentStageIndex) pill.classList.add("active");

      const timeEl = pill.querySelector(".stage-time");
      if(timeEl){
        timeEl.textContent = idx < s.currentStageIndex ? "OK" : idx === s.currentStageIndex ? fmt(s.currentStageLeft) : fmt(s.stages[idx].seconds);
      }
    });
  }

    if(!s){

    }

          <div class="label">Current block</div>
          <div id="currentStageLabel" class="stage-title">${current ? current.label : "-"}</div>
          <div id="timeDisplay" class="time">${fmt(s.currentStageLeft || 0)}</div>
        </div>

        <div class="timer-actions">
          <button id="btnPlayPause" class="btn primary">${s.isRunning ? "Pause" : ((current && current.manualStart) ? "Start decompression" : "Start")}</button>
          <button id="btnNextStage" class="btn">Next block</button>
          <button id="btnResetTimer" class="btn danger">Reset blocks</button>

        </div>

          <div class="ex-left">

          </div>
          <div class="pill">${next ? "Up next" : "Last"}</div>
        </div>

    document.getElementById("btnPlayPause").onclick = () => {

      if(!d) return;
      if(d.isRunning) pauseSequence();

    document.getElementById("btnResetTimer").onclick = resetSequence;
    const finishRight = document.getElementById("btnFinishRight");
    if(finishRight) finishRight.onclick = finishSession;
  }

  async function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended"){
      await audioCtx.resume();
    }
  }

  async function beep(freq=880, duration=0.12, volume=0.06){
    try{
      await ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
  }

  async function patternCountdown(n){
    const map = {3:740,2:840,1:980};
    await beep(map[n] || 880, 0.14, 0.08);
  }
  async function patternStageChange(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.14,0.08), 150);
  }
  async function patternDone(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.12,0.08), 150);
    setTimeout(() => beep(1568,0.18,0.08), 300);

  async function acquireWakeLock(){
    try{
      if("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
        setWakePill(true);
        wakeLock.addEventListener("release", () => setWakePill(false));
      }
    } catch(e){
      setWakePill(false);
    }
  }

  async function releaseWakeLock(){
    try{
      if(wakeLock){
        await wakeLock.release();
        wakeLock = null;
      }
    } catch(e){}
    setWakePill(false);
  }

  document.addEventListener("visibilitychange", async () => {
    const s = loadDay();
    if(document.visibilityState === "visible" && s?.isRunning){
      await acquireWakeLock();
    }
  });

  function startTick(){
    if(timer) clearInterval(timer);
    lastTickSyncSecond = null;
    timer = setInterval(async () => {
      const d = loadDay();
      if(!d || !d.isRunning) return;
      const cur = getCurrentStage(d);
      if(!cur) return;
      const secondsLeft = getStageSecondsLeft(d);
      d.currentStageLeft = secondsLeft;

      if([3,2,1].includes(secondsLeft) && d.lastCountdownBeep !== secondsLeft){
        d.lastCountdownBeep = secondsLeft;
        saveDay(d);
        syncRightPanel(d);
        await patternCountdown(secondsLeft);
        return;
      }

      if(secondsLeft <= 0){
        d.isRunning = false;
        clearStageClock(d);
        saveDay(d);
        syncRightPanel(d);
        await advanceStage(false);
        return;
      }

      if(lastTickSyncSecond !== secondsLeft){
        lastTickSyncSecond = secondsLeft;
        syncRightPanel(d);
      }
    }, 1000);
  }

  async function startSequence(){
    const d = loadDay();
    if(!d) return;
    hydrateStageTime(d);
    d.isRunning = true;
    d.lastCountdownBeep = null;
    armStageClock(d);
    saveDay(d);
    await ensureAudio();
    await acquireWakeLock();
    renderRightPanel();
    startTick();
  }

  async function pauseSequence(){
    const d = loadDay();
    if(!d) return;
    hydrateStageTime(d);
    d.isRunning = false;
    clearStageClock(d);
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  async function advanceStage(manual){
    const d = loadDay();
    if(!d) return;
    const atLast = d.currentStageIndex >= d.stages.length - 1;

    if(atLast){
      d.isRunning = false;
      saveDay(d);
      if(timer) clearInterval(timer);
      timer = null;
      renderRightPanel();
      await releaseWakeLock();
      await patternDone();
      return;
    }

    d.currentStageIndex += 1;
    d.currentStageLeft = d.stages[d.currentStageIndex].seconds;
    clearStageClock(d);
    d.lastCountdownBeep = null;
    const nextStage = d.stages[d.currentStageIndex];
    const shouldAutoRun = !nextStage?.manualStart && !manual;
    d.isRunning = shouldAutoRun;
    if(shouldAutoRun) armStageClock(d);
    saveDay(d);
    renderRightPanel();
    await patternStageChange();

    if(!shouldAutoRun){
      d.isRunning = false;
      saveDay(d);
      renderRightPanel();
    } else {
      startTick();
    }
  }

  async function resetSequence(){
    const d = loadDay();
    if(!d) return;
    d.currentStageIndex = 0;
    d.currentStageLeft = d.stages.length ? d.stages[0].seconds : 0;
    d.isRunning = false;
    clearStageClock(d);
    d.lastCountdownBeep = null;
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  function celebrateConfetti(){
    const canvas = document.getElementById('confettiLayer');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);

    const pieces = Array.from({length: 140}, () => ({
      x: Math.random() * w,
      y: -20 - Math.random() * h * 0.25,
      size: 4 + Math.random() * 8,
      vx: -2 + Math.random() * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      vr: -0.2 + Math.random() * 0.4,
      hue: Math.floor(Math.random() * 360)
    }));

    const start = performance.now();
    function frame(now){
      const elapsed = now - start;
      ctx.clearRect(0,0,w,h);
      pieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.03;
        p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = `hsl(${p.hue} 90% 60%)`;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
        ctx.restore();
      });
      if(elapsed < 2200){
        requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0,0,w,h);
      }
    }
    requestAnimationFrame(frame);
  }

  async function finishSession(){
    const d = loadDay();
    if(!d || d.intuOnly || d.completed) return;
    d.completed = true;
    d.completedAt = new Date().toISOString();
    d.isRunning = false;
    saveDay(d);
    saveCompleted({
      day: d.day,
      dayType: d.dayType,
      completedAt: d.completedAt
    });
    if(d.dayType === 'clubbell' && d.club){
      const last = loadLast();
      last.lastClubType = d.club.clubType;
      last.lastClubTypeIndex = Number.isInteger(d.club.clubTypeIndex)
        ? d.club.clubTypeIndex
        : CLUB_TYPE_SEQUENCE.lastIndexOf(d.club.clubType || "");
      const lastExerciseMap = getLastExerciseMap(last, d.club.clubType);
      (d.club.sequence || []).forEach(item => {
        lastExerciseMap[`${item.bucket}|${item.subcategory}`] = item.exercise;
      });
      saveLast(last);
    }
    if(d.dayType === 'clubbell' && d.countsTowardProgression){
      const progress = loadProgressCached();
      progress.sessionInPhase = (progress.sessionInPhase || 0) + 1;
      if(progress.sessionInPhase >= PHASE_SESSION_COUNT){
        progress.sessionInPhase = PHASE_SESSION_COUNT;
        progress.awaitingDecision = true;
      }
      saveProgressCached(progress);
      d.progressSnapshot = { ...(d.progressSnapshot || {}), sessionInPhase:progress.sessionInPhase, awaitingDecision:progress.awaitingDecision, phaseName:getCurrentPhase(progress).name, pattern:getCurrentPattern(progress), durationMinutes:getCurrentDurationMinutes(progress) };
      saveDay(d);
    }
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    await patternDone();
    celebrateConfetti();
    renderSession(loadDay());
  }

  function renderGate(existing){
    const _raw = existing?.scores ?? { soreness:null, energy:null, sleep:null };
    const scores = { soreness:_raw.soreness, energy:_raw.energy, sleep:_raw.sleep };

    leftCard.innerHTML = `
      <h2>Recovery Check</h2>
      <div class="gate-grid">
        ${gateDef.map(g => `
          <div class="gate-row">
            <div class="label">${g.label}</div>
            <div class="score-row" data-gkey="${g.key}">
              ${[0,1,2,3,4,5].map(n => `<button type="button" class="score-btn" data-score="${n}" aria-label="Score ${n}">${n}</button>`).join('')}
            </div>
            <div class="score-label" id="lbl-${g.key}">-</div>
          </div>
        `).join('')}
        <div class="total">
          <div>
            <div class="label">Total</div>
            <div class="n" id="totalN">0</div>
          </div>
          <div id="band" class="badge">-</div>
        </div>
        <div class="row">
          <button id="btnGenerate" class="btn primary" disabled>Generate session</button>
          <span class="small">0-8 = Intu only | Clubbell: 9-11 = 15 min fallback, 12-15 = progression duration (15/20/25/30) | Body-Flow day: 40 min cap | Body-Flow follows a completed Clubbell day</span>
        </div>
      </div>
    `;

    const totalEl = document.getElementById('totalN');
    const bandEl = document.getElementById('band');
    const btnGenerate = document.getElementById('btnGenerate');

    function updateUI(){
      const vals = Object.values(scores);
      const complete = vals.every(v => typeof v === 'number');
      const total = vals.reduce((a,b) => a + (typeof b==='number' ? b : 0), 0);
      totalEl.textContent = String(total);
      const b = computeBand(total);
      bandEl.className = `badge ${b.cls}`;
      bandEl.textContent = b.label;
      gateDef.forEach(g => {
        const v = scores[g.key];
        const el = document.getElementById(`lbl-${g.key}`);
        el.textContent = typeof v === 'number' ? g.choices[v] : '-';
      });
      btnGenerate.disabled = !complete;
    }

    gateDef.forEach(g => {
      const v = scores[g.key];
      if(typeof v !== "number") return;
      const row = leftCard.querySelector(`.score-row[data-gkey="${g.key}"]`);
      const btn = row?.querySelector(`.score-btn[data-score="${v}"]`);
      if(btn) btn.classList.add("active");
    });

    document.querySelectorAll('.score-row').forEach(row => {
      row.addEventListener('click', (e) => {
        const t = e.target;
        if(!t.classList.contains('score-btn')) return;
        const key = row.dataset.gkey;
        const v = Number(t.dataset.score);
        scores[key] = v;
        row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        updateUI();
      });
    });

    btnGenerate.onclick = () => {
      const total = Object.values(scores).reduce((a,b)=>a+b,0);
      const band = computeBand(total).band;
      const session = generateSession(band, total);
      renderSession(session);
    };



    updateUI();
    renderRightNone();
    setModePill("-");
    setDayPill("new");
  }

  function migrateLegacyStorage(day){
    if(day && (loadJSON(LS_DAY_LEGACY) || loadJSON(LS_DAY_LEGACY_2))){
      saveDay(day);
      removeStorageKeys([LS_DAY_LEGACY, LS_DAY_LEGACY_2]);

      saveLast(loadLast());
      removeStorageKeys([LS_LAST_LEGACY, LS_LAST_LEGACY_2]);
    }
    if(loadJSON(LS_COMPLETED_LEGACY) && !loadJSON(LS_COMPLETED)){
      saveCompleted(loadCompleted());
      removeStorageKeys([LS_COMPLETED_LEGACY]);
    }
  }

  function boot(){
    const day = loadDay();
    migrateLegacyStorage(day);
    renderSettings();
    if(day){

      beginning:"Start from Spinal Arch or Quad Squat.",
      middle:"Lift one leg high into extension while maintaining an arched spinal structure and controlled breathing.",
      ending:"Finish in Spinal Arch or Quad Squat." }
  ];
  const V6_STANDALONE_BMES = V6_BME_DEFS.filter(x => x.id !== "ARM_SCREW");
  const V6_DECOMP_BMES = V6_BME_DEFS.filter(x => x.decomp || x.id === "ARM_SCREW");
  function v6BmeById(id){ return V6_BME_DEFS.find(x => x.id === id); }
  function v6Intersects(a,b){ return (a || []).some(x => (b || []).includes(x)); }
  function v6BaseName(id){ return BODYFLOW_BASE_LABEL[id] || id || "-"; }
  function v6BaseList(ids){ return (ids || []).map(v6BaseName).join(", "); }

  function getBFSettings(){
    const base = { enableStandalone:true, standaloneBmeCount:3 };
    try{
      const stored = JSON.parse(localStorage.getItem(BF_SETTINGS_KEY) || "{}");
      const next = { ...base, ...stored };
      next.standaloneBmeCount = Math.max(3, Math.min(5, Number(next.standaloneBmeCount) || 3));
      return next;
    } catch { return base; }
  }
  function setBFSettings(next){ localStorage.setItem(BF_SETTINGS_KEY, JSON.stringify({ ...getBFSettings(), ...next })); }

  function v6PickDecompressionBme(seedKey){
    const rng = mulberry32(hashStrToSeed(seedKey));
    return V6_DECOMP_BMES[Math.floor(rng() * V6_DECOMP_BMES.length)];
  }

  function v6PickBmeSet(seedKey, count){
    const rng = mulberry32(hashStrToSeed(seedKey));
    const pool = bfShuffle(rng, V6_STANDALONE_BMES);
    const first = pool.shift();
    const selected = [first];
    while(selected.length < count && pool.length){
      const prev = selected[selected.length - 1];
      let candidates = pool.filter(x => v6Intersects(prev.end, x.start) && !selected.some(s => s.family === x.family && selected.length < 3));
      if(!candidates.length) candidates = pool.filter(x => v6Intersects(prev.end, x.start));
      if(!candidates.length) candidates = pool;
      const pick = candidates[Math.floor(rng() * candidates.length)];
      selected.push(pick);
      pool.splice(pool.findIndex(x => x.id === pick.id), 1);
    }
    return selected.slice(0, count);
  }

  function v6BuildBodyFlowLadder(bmes){
    const steps = [];
    bmes.forEach((bme, index) => {
      steps.push({
        type:"practice",
        title:`Practice BME #${index + 1}: ${bme.name}`,
        detail:`Study beginning -> middle -> ending. Compose the full BME ultra-slow until excess tension drops.`,
        bmes:[bme]
      });
    });
    for(let i = 0; i < bmes.length - 1; i += 1){
      steps.push({
        type:"graft",
        title:`Graft #${i + 1} -> #${i + 2}: ${bmes[i].name} into ${bmes[i+1].name}`,
        detail:`Weave the ending component of ${bmes[i].name} into the beginning component of ${bmes[i+1].name}.`,
        bmes:[bmes[i], bmes[i+1]]
      });
      steps.push({
        type:"chain",
        title:`Chain #${i + 1} + #${i + 2}: ${bmes[i].name} -> ${bmes[i+1].name}`,
        detail:`Practice both BME's as one continuous movement while keeping breathing, movement and structure integrated.`,
        bmes:[bmes[i], bmes[i+1]]
      });
    }
    steps.push({
      type:"full-chain",
      title:`Full kinetic chain: ${bmes.map(x => x.name).join(" -> ")}`,
      detail:`Practice the complete ${bmes.length}-BME flow without forcing. Stop or repeat if bracing, wincing, flinching or excess conscious control returns.`,
      bmes:bmes.slice()
    });
    return steps.map((step, index) => ({ index:index + 1, ...step }));
  }

  function v6BuildStandaloneBodyFlow(seedKey, count){
    const bmes = v6PickBmeSet(seedKey, count);
    return {
      name:"Authentic Body-Flow Practice",
      bmeCount:bmes.length,
      bmes,
      ladder:v6BuildBodyFlowLadder(bmes),
      use:"Start with roughly 2 minutes of Performance Breathing, then work through the ladder as far as quality allows within the 40-minute cap. It is fine to spend the whole session on BME #1.",
      rule:"Advance only when the current BME or link is smooth, breath-led, free of excess tension and available with minimal conscious involvement."
    };
  }

  function buildStages(session){
    const stages = [];
    if(session.dayType === 'clubbell'){
      stages.push({ key:'club', label:`Clubbell | ${fmtMin(session.blockTimes.club)}`, seconds:session.blockTimes.club });
      stages.push({ key:'decomp', label:`Decompress BME | ${fmtMin(session.blockTimes.decomp)}`, seconds:session.blockTimes.decomp, manualStart:true });
    } else if(session.dayType === 'bodyflow'){
      stages.push({ key:'bodyflow', label:`Body-Flow Practice | ${fmtMin(session.blockTimes.bodyFlow)}`, seconds:session.blockTimes.bodyFlow });
    }
    return stages;
  }

  function generateSession(mode, total){
    const last = loadLast();
    const band = computeBand(total);
    const dayType = computeTrainingDayType();
    let progress = loadProgressCached();

    const session = {
      day: todayKey(),
      total,
      modeRequested: mode,
      mode: band.intuOnly ? 'INTU ONLY' : (dayType === 'clubbell' ? 'CLUBBELL DAY' : 'BODY FLOW DAY'),
      dayType,
      intuOnly: band.intuOnly,
      countsTowardProgression: false,
      delayedPlannedDay: band.intuOnly,
      intu: intu.slice(),
      club: null,
      bodyFlow: null,
      decompFlow: null,
      blockTimes: { intu: 8 * 60, club: 0, bodyFlow: 0, decomp: 0 },
      stages: [],
      currentStageIndex: 0,
      currentStageLeft: 0,
      currentStageStartedAt: null,
      currentStageEndsAt: null,
      isRunning: false,
      lastCountdownBeep: null,
      completed: false,
      completedAt: null,
      settingsUsed:{ cst:getCSTSettings(), bodyFlow:getBFSettings() },
      progressSnapshot:{
        phaseIndex:progress.phaseIndex,
        phaseName:getCurrentPhase(progress).name,
        sessionInPhase:progress.sessionInPhase,
        durationMinutes:getEffectiveMainDuration(total, progress),
        awaitingDecision:progress.awaitingDecision,
        pattern:getCurrentPattern(progress)
      }
    };

    if(band.intuOnly){
      saveLast(last);
    } else if(dayType === 'clubbell'){
      const clubTypePick = nextFullClubType(last);
      const clubType = clubTypePick.type;
      const clubPlan = generateClubExercises(clubType, progress, last);
      const decompBme = v6PickDecompressionBme(`${todayKey()}|v6-decompress-bme`);
      session.club = {
        allowedClubTypes:Object.entries(session.settingsUsed.cst.clubTypes).filter(([,v]) => v).map(([k]) => k),
        clubType,
        clubTypeIndex:clubTypePick.index,
        phaseName:clubPlan.phaseName,
        pattern:clubPlan.pattern,
        sessionNumber:(progress.sessionInPhase || 0) + 1,
        sequence: clubPlan.sequence,
        flow: clubPlan.flow
      };
      session.decompFlow = {
        name:"Body-Flow Decompression BME",
        bme:decompBme,
        focus:"One BME | 5-minute post-Clubbell reset",
        use:"After Clubbell: practice this single BME slowly for 5 minutes. Let it unload the shoulders, spine, hips and breath. Do not turn it into conditioning.",
        rule:"Study beginning -> middle -> ending. Repeat gently until excess tension softens."
      };
      session.blockTimes.club = getEffectiveMainDuration(total, progress) * 60;
      session.blockTimes.decomp = 5 * 60;
      session.countsTowardProgression = !!band.useProgression;
      // Do not commit Clubbell type rotation or exercise history here.
      // Reset day may regenerate today's plan; the rotation only advances on Finish.
      saveLast(last);
      saveProgressCached(progress);
    } else {
      const bfSettings = getBFSettings();
      session.bodyFlow = v6BuildStandaloneBodyFlow(`${todayKey()}|v6-body-flow-practice`, bfSettings.standaloneBmeCount);
      session.blockTimes.bodyFlow = 40 * 60;
      saveLast(last);
    }

    session.stages = buildStages(session);
    session.currentStageLeft = session.stages.length ? session.stages[0].seconds : 0;
    saveDay(session);
    return session;
  }

    if(progressionCard){
      const startHold = () => { clearProgressionHold(); progressionHoldTimer = setTimeout(showProgressionAdvanced, 5000); };
      ['pointerdown', 'mousedown', 'touchstart'].forEach(evt => progressionCard.addEventListener(evt, startHold));
      ['pointerup', 'pointerleave', 'pointercancel', 'mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(evt => progressionCard.addEventListener(evt, clearProgressionHold));
    }
    if(btnApplyProgressionOverride){
      btnApplyProgressionOverride.onclick = () => {
        saveProgressCached({ ...loadProgressCached(), phaseIndex:Math.max(0, Math.min(PHASES.length - 1, Number(progressionPhaseSelect.value))), sessionInPhase:Math.max(0, Math.min(PHASE_SESSION_COUNT - 1, Number(progressionSessionSelect.value))), awaitingDecision:false });
        cachedDay = null; renderSettings(); boot();
      };
    }
    if(btnHideProgressionAdvanced) btnHideProgressionAdvanced.onclick = () => progressionAdvanced?.classList.remove('active');
    settingsCstCard.querySelectorAll('[data-cst-club]').forEach(input => {
      input.addEventListener('change', () => {
        const next = getCSTSettings(); next.clubTypes[input.dataset.cstClub] = input.checked;
        if(!Object.values(next.clubTypes).some(Boolean)) next.clubTypes[input.dataset.cstClub] = true;
        setCSTSettings(next); renderSettings();
      });
    });
    const btnResetPhase1 = document.getElementById('btnResetPhase1');
    if(btnResetPhase1) btnResetPhase1.onclick = () => { saveProgressCached(resetProgressToPhase1()); cachedDay = null; renderSettings(); boot(); };
  }

  setWakePill(false);
  initTabs();
  boot();
})();
</script>
