<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CST Generator V4</title>
<style>
  :root{
    --bg:#0e1116;
    --surface:#131821;
    --surface2:#10151d;
    --text:#e7edf6;
    --muted:#aab4c4;
    --line:#253042;
    --acc:#7aa7ff;
    --good:#5fd08a;
    --mid:#e0b45c;
    --rec:#7aa7ff;
    --warn:#ffcc66;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:14px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:var(--bg); color:var(--text);
  }
  .wrap{max-width:980px; margin:0 auto; display:grid; gap:12px}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
  }
  .grid{display:grid; grid-template-columns:1fr; gap:12px}
  @media (min-width: 880px){ .grid{ grid-template-columns: 1.2fr .8fr; } }
  h1{font-size:20px; margin:0 0 6px}
  h2{font-size:15px; margin:0 0 8px}
  p{margin:0; color:var(--muted); line-height:1.35; font-size:13px}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .btn{
    appearance:none; border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04); color:var(--text);
    border-radius:12px; padding:12px 14px; font-weight:850; cursor:pointer;
    min-height:46px;
  }
  .btn.primary{border-color: rgba(122,167,255,0.45); background: rgba(122,167,255,0.10);}
  .btn.danger{border-color: rgba(255,120,120,0.40); background: rgba(255,120,120,0.10);}
  .btn.good{border-color: rgba(95,208,138,0.45); background: rgba(95,208,138,0.10);}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .btn:focus-visible,
  .score-btn:focus-visible,
  .accordion-header:focus-visible{
    outline:2px solid var(--acc);
    outline-offset:2px;
  }
  .pill{
    display:inline-flex; gap:6px; align-items:center; padding:6px 10px; border-radius:999px;
    border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03);
    color:var(--muted); font-size:12px;
  }
  .pill strong{color:var(--text)}
  .exercise{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:12px;
    padding:10px 12px;
    display:flex; gap:10px; justify-content:space-between; align-items:flex-start;
  }
  .ex-left{display:grid; gap:3px}
  .ex-title{font-weight:850}
  .ex-meta{color:var(--muted); font-size:12px}
  .label{color:var(--muted); font-size:12px}
  .time{font-variant-numeric: tabular-nums; font-size:52px; font-weight:900; letter-spacing:.5px; line-height:1;}
  .stage-title{font-size:18px; font-weight:900; margin-bottom:4px;}
  .hr{height:1px; background:var(--line); margin:12px 0;}
  .small{font-size:12px; color:var(--muted)}
  .gate-grid{display:grid; gap:12px}
  .gate-row{display:grid; gap:8px}
  .score-row{display:flex; gap:8px; flex-wrap:wrap}
  .score-btn{
    appearance:none;
    width:48px; height:42px; display:inline-flex; justify-content:center; align-items:center;
    border-radius:12px; border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.06); color:var(--text);
    font-weight:900; cursor:pointer; user-select:none;
  }
  .score-btn.active{
    border-color: rgba(255, 157, 46, 0.55);
    background: linear-gradient(180deg, rgba(255, 157, 46, 0.22), rgba(255, 157, 46, 0.10));
    transform: scale(1.08);
  }
  .score-label{margin-top:6px; min-height:18px; font-size:12px; color:var(--muted); font-weight:600}
  .total{
    display:flex; gap:10px; align-items:center; justify-content:space-between;
    border:1px solid var(--line); background:var(--surface2); border-radius:12px; padding:10px 12px;
  }
  .total .n{font-size:28px; font-weight:900; font-variant-numeric: tabular-nums}
  .badge{
    padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900;
    border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.04); color:var(--muted);
  }
  .badge.good{ color: rgba(55,214,122,1); border-color: rgba(55,214,122,.4); background: rgba(55,214,122,.08); }
  .badge.mid{ color: rgba(255,176,32,1); border-color: rgba(255,176,32,.4); background: rgba(255,176,32,.08); }
  .badge.rec{ color: rgba(83,166,255,1); border-color: rgba(83,166,255,.45); background: rgba(83,166,255,.10); }

  .accordion{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:12px;
    overflow:hidden;
    margin-top:10px;
  }
  .accordion-header{
    width:100%;
    appearance:none;
    border:0;
    background:transparent;
    color:var(--text);
    padding:12px 14px;
    font-weight:850;
    text-align:left;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .accordion-header:hover,
  .accordion-header:focus-visible{ background:rgba(255,255,255,.03); }
  .accordion-header::after{
    content:"\25B6";
    color:var(--muted);
    transition:transform .2s ease;
    flex:0 0 auto;
  }
  .accordion.active > .accordion-header::after{
    transform:rotate(90deg);
  }
  .accordion-content{
    display:none;
    padding:0 12px 12px;
    border-top:1px solid var(--line);
  }
  .accordion.active > .accordion-content{
    display:block;
  }

  .timeline{
    display:grid;
    gap:8px;
    margin-top:12px;
  }
  .stage-pill{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--surface2);
    color:var(--muted);
    font-size:13px;
  }
  .stage-pill.active{
    border-color: rgba(122,167,255,0.45);
    background: rgba(122,167,255,0.10);
    color:var(--text);
  }
  .stage-pill.done{
    border-color: rgba(95,208,138,0.45);
    background: rgba(95,208,138,0.08);
    color:var(--text);
  }
  .beep-pill{
    color:var(--warn);
    border-color: rgba(255,204,102,.4);
    background: rgba(255,204,102,.08);
  }
  .mt-10{margin-top:10px}
  .mt-12{margin-top:12px}
  .mb-10{margin-bottom:10px}
  .mb-12{margin-bottom:12px}
  .stack-10{display:grid; gap:10px}
  .stack-10.mt-12{margin-top:12px}


  .intu-item{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:12px;
    overflow:hidden;
  }
  .intu-summary{
    list-style:none;
    cursor:pointer;
    padding:10px 12px;
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:flex-start;
  }
  .intu-summary::-webkit-details-marker{display:none}
  .intu-summary::after{
    content:"\25B6";
    color:var(--muted);
    transition:transform .2s ease;
    flex:0 0 auto;
    margin-top:2px;
  }
  .intu-item[open] .intu-summary::after{transform:rotate(90deg)}
  .intu-summary:hover,
  .intu-summary:focus-visible{background:rgba(255,255,255,.03); outline:none}
  .intu-body{
    border-top:1px solid var(--line);
    padding:10px 12px 12px;
    color:var(--muted);
    font-size:12px;
    line-height:1.45;
  }
  .finish-row{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px}
  .btn.finish{border-color: rgba(95,208,138,0.45); background: rgba(95,208,138,0.12);}
  .btn.finish[disabled]{opacity:.55}
  .tabbar{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
  .tab{appearance:none; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:var(--muted); border-radius:999px; padding:8px 12px; font-weight:800; cursor:pointer}
  .tab.active{color:var(--text); border-color: rgba(122,167,255,0.45); background: rgba(122,167,255,0.10);}
  .panel{display:none}
  .panel.active{display:block}
  .settings-grid{display:grid; grid-template-columns:1fr; gap:12px}
  @media (min-width: 880px){ .settings-grid{ grid-template-columns: 1fr 1fr; } }
  .setting-list{display:grid; gap:12px}
  .kv{display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center}
  .kv select{width:220px; max-width:100%; padding:9px 10px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:var(--text)}
  .toggle-list{display:grid; gap:10px}
  .toggle-item{display:flex; justify-content:space-between; gap:12px; align-items:center; padding:10px 12px; border:1px solid var(--line); border-radius:12px; background:var(--surface2)}
  .toggle-item input{accent-color:#7aa7ff; width:18px; height:18px}
  .settings-note{font-size:12px; color:var(--muted); line-height:1.4}
  .hidden-advanced{display:none}
  .hidden-advanced.active{display:grid; gap:10px}
  #confettiLayer{position:fixed; inset:0; pointer-events:none; z-index:9999}

</style>
</head>
<body>
<canvas id="confettiLayer"></canvas>

<div class="wrap">
  <div class="card">
    <h1>CST Generator V4</h1>
    <div class="row mt-10">
      <button id="btnMain" class="btn primary">Start</button>
      <button id="btnReset" class="btn danger">Reset day</button>
      <span id="modePill" class="pill">Mode: <strong>-</strong></span>
      <span id="dayPill" class="pill">Today: <strong>new</strong></span>
      <span id="wakePill" class="pill">Wake Lock: <strong>off</strong></span>
      <span class="pill beep-pill">Beeps: <strong>3-2-1 + switch + done</strong></span>
    </div>
    <div class="tabbar">
      <button type="button" class="tab active" data-tab="today">Today</button>
      <button type="button" class="tab" data-tab="settings">Settings</button>
    </div>
  </div>

  <section id="panel-today" class="panel active">
    <div class="grid">
      <div id="leftCard" class="card"></div>
      <div id="rightCard" class="card"><div id="rightInner"></div></div>
    </div>
  </section>

  <section id="panel-settings" class="panel">
    <div class="settings-grid">
      <div id="settingsCstCard" class="card"></div>
      <div id="settingsAfCard" class="card"></div>
    </div>
  </section>
</div>

      if (move.kind === "SET") score -= 0.8;
      if (move.kind === "FSS") score += 0.3;
      return score;
    }
    if (move.id === prevMove.id) score -= 4;
    if (move.family === prevMove.family) score -= 1.5;
    if (move.kind === prevMove.kind && move.kind !== "SET") score -= 0.5;
    if (stepIndex < 2 && move.kind === "SET") score -= 1.2;
    if (prevMove.id === "CRAB_REACH" && ["US_C2B", "UST_CRAB", "JUS_CRAB", "FS_CRAB", "US_C2LB", "USA_CRAB", "RT_CRAB"].includes(move.id)) score += 1.2;
    if (prevMove.id === "BR_LB" && move.id === "FSTEP_LB") score += 1.2;
    if (prevMove.id === "FSTEP_LB" && move.id === "FST_LB") score += 1.4;
    if (prevMove.id === "FST_LB" && move.id === "FKT_LB") score += 1.2;
    if (prevMove.id === "RUS_APE" && ["CRAB_REACH","US_C2B","RT_CRAB","CROCR_CRAB","USA_CRAB"].includes(move.id)) score += 1.3;
    if (prevMove.id === "USA_CRAB" && ["APE_REACH","RUS_APE","SSWEEP_APE","TF_APE_LAT1","TF_APE_LAT2","TF_APE_LAT3"].includes(move.id)) score += 1.4;
    if (prevMove.id === "SSWEEP_APE" && ["RUS_APE","APE_REACH","SET_BEAST_FROM_APE","SET_LB_FROM_APE"].includes(move.id)) score += 1.2;
    if (prevMove.id === "RT_CRAB" && ["CROCR_CRAB","CRAB_REACH","USA_CRAB","US_C2B"].includes(move.id)) score += 1.3;
    if (prevMove.id === "CROCR_CRAB" && move.id === "PO_CRAB") score += 2.0;
    if (prevMove.id === "PO_CRAB" && ["RUS_APE","APE_REACH","SSWEEP_APE"].includes(move.id)) score += 1.5;
    if (flags.locomotionEnabled && move.phase === "LOCO") score += 0.6;
    if (prevMove.phase === "LOCO" && move.phase === "LOCO") score -= 1.0;
    const recent = history.slice(-2);
    const recentFSS = recent.filter(x => x.kind === "FSS").length;
    if (move.kind === "FSS" && recentFSS >= 2) score -= 1.8;
    const recentSets = recent.filter(x => x.kind === "SET").length;
    if (move.kind === "SET" && recentSets >= 1) score -= 1.4;
    const recentAdvanced = recent.filter(x => x.phase === "L2_ADV").length;
    if (move.phase === "L2_ADV" && recentAdvanced >= 1) score -= 1.8;
    const recentLoco = recent.filter(x => x.phase === "LOCO").length;
    if (move.phase === "LOCO" && recentLoco >= 1) score -= 1.2;
    return score;
  }
  function afWeightedPick(rng, moves, prevMove, stepIndex, history, flags){
    const weighted = moves.map(move => ({ move, weight: Math.max(0.1, afScoreMove(move, prevMove, stepIndex, history, flags)) }));
    const total = weighted.reduce((sum, x) => sum + x.weight, 0);
    let r = rng() * total;
    for (const item of weighted){ r -= item.weight; if (r <= 0) return item.move; }
    return weighted[weighted.length - 1].move;
  }
  function afGetReturnCandidates(fromBase, targetBase, flags, includeL1TF){
    return afGetAllowedFromBase(fromBase, flags, includeL1TF).filter(move => move.end === targetBase);
  }
  function buildAnimalFlowSequence(seedKey, opts = {}){
    const rng = afMulberry32(afHashStrToSeed(seedKey));
    const includeL1TF = !!opts.includeTF;
    const length = opts.length === "random" ? (8 + Math.floor(rng() * 3)) : Number(opts.length);
    const startBase = opts.startBase === "random" ? afChoice(rng, ["CRAB","BEAST","LOADED_BEAST","APE"]) : opts.startBase;
    const flags = { advancedEnabled: rng() < 0.15, locomotionEnabled: rng() < 0.25 };
    let currentBase = startBase;
    let prevMove = null;
    const steps = [];
    steps.push({ index:1, start:startBase, moveId:`SET_${startBase}`, name:`Set ${AF_BASE_LABEL[startBase]}`, kind:"SET", end:startBase, family:"SET", phase:"BASE" });
    const middleCount = Math.max(0, length - 2);
    for (let i = 0; i < middleCount; i++){
      const allowed = afGetAllowedFromBase(currentBase, flags, includeL1TF);
      const candidates = allowed.filter(move => {
        if (move.id === prevMove?.id && allowed.length > 1) return false;
        const returnOptions = afGetReturnCandidates(move.end, startBase, flags, includeL1TF);
        return returnOptions.length > 0;
      });
      const pool = candidates.length ? candidates : allowed;
      const chosen = afWeightedPick(rng, pool, prevMove, i + 1, steps, flags);
      steps.push({ index:steps.length + 1, start:currentBase, moveId:chosen.id, name:chosen.name, kind:chosen.kind, end:chosen.end, family:chosen.family, phase:chosen.phase });
      currentBase = chosen.end;
      prevMove = chosen;
    }
    let returnCandidates = afGetReturnCandidates(currentBase, startBase, flags, includeL1TF);
    if (!returnCandidates.length){
      const safeFlags = { ...flags, advancedEnabled:false, locomotionEnabled:false };
      returnCandidates = afGetReturnCandidates(currentBase, startBase, safeFlags, false);
    }
    const finalMove = afWeightedPick(rng, returnCandidates, prevMove, steps.length, steps, flags);
    steps.push({ index:steps.length + 1, start:currentBase, moveId:finalMove.id, name:finalMove.name, kind:finalMove.kind, end:finalMove.end, family:finalMove.family, phase:finalMove.phase, isReturn:true });
    return { seedKey, length, startBase, includeTF:includeL1TF, includeHB:!!opts.includeHB, advancedEnabled:flags.advancedEnabled, locomotionEnabled:flags.locomotionEnabled, endBase:finalMove.end, steps };
  }

    for(let i=a.length-1;i>0;i--){

  function nextFullClubType(lastState = loadLast()){
    const cstSettings = getCSTSettings();
    let pool = CLUB_TYPE_WEIGHTS.filter(x => cstSettings.clubTypes?.[x.type]);
    if(!pool.length) pool = CLUB_TYPE_WEIGHTS.filter(x => x.type === "single");
    const previousType = lastState.lastClubType || null;
    if(pool.length > 1){
      const withoutPrevious = pool.filter(x => x.type !== previousType);
      if(withoutPrevious.length) pool = withoutPrevious;
    }

    const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
    let roll = Math.random() * totalWeight;

    for(const item of pool){
      if(roll < item.weight) return item.type;
      roll -= item.weight;
    }

    return pool.length ? pool[pool.length - 1].type : "single";
  }

  
  function getFamilyBag(last, familyKey){
    if(!last.familyBags || typeof last.familyBags !== "object") last.familyBags = {};
    if(!Array.isArray(last.familyBags[familyKey])) last.familyBags[familyKey] = [];
    return last.familyBags[familyKey];
  }

  function drawShapeFromFamily(last, familyKey, excludeShape = null){
    const family = FAMILY_BY_KEY[familyKey];
    if(!family) return null;
    let bag = getFamilyBag(last, familyKey).slice();
    const lastPick = last.familyLastPick?.[familyKey] || null;

    const refill = () => {
      let pool = family.shapes.slice();
      if(excludeShape) pool = pool.filter(x => x !== excludeShape);
      bag = shuffle(pool);
      if(lastPick && bag.length > 1 && bag[0] === lastPick){
        const swapIdx = bag.findIndex(x => x !== lastPick);
        if(swapIdx > 0) [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    };

    if(!bag.length) refill();
    if(excludeShape && bag.every(x => x === excludeShape)) refill();
    if(!bag.length) return null;

    const shape = bag.shift();
    last.familyBags[familyKey] = bag;
    if(!last.familyLastPick || typeof last.familyLastPick !== "object") last.familyLastPick = {};
    last.familyLastPick[familyKey] = shape;
    return shape;
  }

  function buildFamilyPractice(kind, lastState = loadLast()){

      shape:drawShapeFromFamily(lastState, key)
    }));

    if(kind === "standalone"){
      const extraFamilyKey = rand(familyKeys);
      const existing = picks.find(x => x.familyKey === extraFamilyKey);
      picks.push({
        familyKey:extraFamilyKey,
        familyName:FAMILY_BY_KEY[extraFamilyKey].name,
        shape:drawShapeFromFamily(lastState, extraFamilyKey, existing?.shape || null),
        isExtra:true
      });
    }

    return picks;
  }

  function bindAccordions(){
    const getDirectAccordionHeader = (accordion) => Array.from(accordion.children).find(el => el.classList?.contains('accordion-header')) || null;
    const getDirectAccordionContent = (accordion) => Array.from(accordion.children).find(el => el.classList?.contains('accordion-content')) || null;
    const getSiblingAccordions = (accordion) => Array.from(accordion?.parentElement?.children || []).filter(el => el.classList?.contains('accordion'));
    const headers = leftCard.querySelectorAll('.accordion-header');
    headers.forEach((btn, index) => {
      const parent = btn.closest('.accordion');
      const content = parent ? getDirectAccordionContent(parent) : null;
      const contentId = `accordion-content-${index}`;
      if(content){
        content.id = contentId;
        btn.setAttribute("aria-controls", contentId);
      }
      btn.setAttribute("aria-expanded", String(parent?.classList.contains('active') || false));
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const parent = btn.closest('.accordion');
        const isOpen = parent.classList.contains('active');
        getSiblingAccordions(parent).forEach(acc => {
          acc.classList.remove('active');
          const header = getDirectAccordionHeader(acc);
          if(header) header.setAttribute("aria-expanded", "false");
        });
        if(!isOpen){
          parent.classList.add('active');
          btn.setAttribute("aria-expanded", "true");
        }
      });
    });
  }

  async function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended"){
      await audioCtx.resume();
    }
  }

  async function beep(freq=880, duration=0.12, volume=0.06){
    try{
      await ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
  }

  async function patternCountdown(n){
    const map = {3:740,2:840,1:980};
    await beep(map[n] || 880, 0.14, 0.08);
  }
  async function patternStageChange(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.14,0.08), 150);
  }
  async function patternDone(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.12,0.08), 150);
    setTimeout(() => beep(1568,0.18,0.08), 300);
  }

  async function acquireWakeLock(){
    try{
      if("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
        setWakePill(true);
        wakeLock.addEventListener("release", () => setWakePill(false));
      }
    } catch(e){
      setWakePill(false);
    }
  }
  async function releaseWakeLock(){
    try{
      if(wakeLock){
        await wakeLock.release();
        wakeLock = null;
      }
    } catch(e){}
    setWakePill(false);
  }

  document.addEventListener("visibilitychange", async () => {
    const s = loadDay();
    if(document.visibilityState === "visible" && s?.isRunning){

    timer = setInterval(async () => {
      const d = loadDay();
      if(!d || !d.isRunning) return;
      const cur = getCurrentStage(d);
      if(!cur) return;
      const secondsLeft = getStageSecondsLeft(d);
      d.currentStageLeft = secondsLeft;

      if([3,2,1].includes(secondsLeft) && d.lastCountdownBeep !== secondsLeft){
        d.lastCountdownBeep = secondsLeft;
        saveDay(d);
        syncRightPanel(d);
        await patternCountdown(secondsLeft);
        return;
      }

      if(secondsLeft <= 0){
        d.isRunning = false;
        clearStageClock(d);
        saveDay(d);
        syncRightPanel(d);
        await advanceStage(false);
        return;
      }

      if(lastTickSyncSecond !== secondsLeft){
        lastTickSyncSecond = secondsLeft;
        syncRightPanel(d);
      }
    }, 1000);
  }

  async function startSequence(){
    const d = loadDay();
    if(!d) return;
    hydrateStageTime(d);
    d.isRunning = true;
    d.lastCountdownBeep = null;
    armStageClock(d);
    saveDay(d);
    await ensureAudio();
    await acquireWakeLock();
    renderRightPanel();
    startTick();
  }

  async function pauseSequence(){
    const d = loadDay();
    if(!d) return;
    hydrateStageTime(d);
    d.isRunning = false;
    clearStageClock(d);
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  async function advanceStage(manual){
    const d = loadDay();
    if(!d) return;
    const atLast = d.currentStageIndex >= d.stages.length - 1;

    if(atLast){
      d.isRunning = false;
      saveDay(d);
      if(timer) clearInterval(timer);
      timer = null;
      renderRightPanel();
      await releaseWakeLock();
      await patternDone();
      return;
    }

    d.currentStageIndex += 1;
    d.currentStageLeft = d.stages[d.currentStageIndex].seconds;
    clearStageClock(d);
    d.lastCountdownBeep = null;
    const nextStage = d.stages[d.currentStageIndex];
    const shouldAutoRun = !nextStage?.manualStart && !manual;
    d.isRunning = shouldAutoRun;
    if(shouldAutoRun) armStageClock(d);
    saveDay(d);
    renderRightPanel();
    await patternStageChange();

    if(!shouldAutoRun){
      d.isRunning = false;
      saveDay(d);
      renderRightPanel();
    } else {
      startTick();
    }
  }

  async function resetSequence(){
    const d = loadDay();
    if(!d) return;
    d.currentStageIndex = 0;
    d.currentStageLeft = d.stages.length ? d.stages[0].seconds : 0;
    d.isRunning = false;
    clearStageClock(d);
    d.lastCountdownBeep = null;
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  function celebrateConfetti(){
    const canvas = document.getElementById('confettiLayer');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);

    const pieces = Array.from({length: 140}, () => ({
      x: Math.random() * w,
      y: -20 - Math.random() * h * 0.25,
      size: 4 + Math.random() * 8,
      vx: -2 + Math.random() * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      vr: -0.2 + Math.random() * 0.4,
      hue: Math.floor(Math.random() * 360)
    }));

    const start = performance.now();
    function frame(now){
      const elapsed = now - start;
      ctx.clearRect(0,0,w,h);
      pieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.03;
        p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = `hsl(${p.hue} 90% 60%)`;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
        ctx.restore();
      });
      if(elapsed < 2200){
        requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0,0,w,h);
      }
    }
    requestAnimationFrame(frame);
  }

  async function finishSession(){
    const d = loadDay();
    if(!d || d.intuOnly || d.completed) return;
    d.completed = true;
    d.completedAt = new Date().toISOString();
    d.isRunning = false;
    saveDay(d);
    saveCompleted({
      day: d.day,
      dayType: d.dayType,
      completedAt: d.completedAt
    });
    if(d.dayType === 'clubbell' && d.countsTowardProgression){
      const progress = loadProgressCached();
      progress.sessionInPhase = (progress.sessionInPhase || 0) + 1;
      if(progress.sessionInPhase >= 12){
        progress.sessionInPhase = 12;
        progress.awaitingDecision = true;
      }
      saveProgressCached(progress);
      d.progressSnapshot = { ...(d.progressSnapshot || {}), sessionInPhase:progress.sessionInPhase, awaitingDecision:progress.awaitingDecision, phaseName:getCurrentPhase(progress).name, pattern:getCurrentPattern(progress), durationMinutes:getCurrentDurationMinutes(progress) };
      saveDay(d);
    }
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    await patternDone();
    celebrateConfetti();
    renderSession(loadDay());
  }

  function renderPhaseDecision(){
    const progress = loadProgressCached();
    const phase = getCurrentPhase(progress);
    leftCard.innerHTML = `
      <h2>Phase checkpoint</h2>
      ${renderExerciseCard("Current phase", `${phase.name} completed`, "Checkpoint", "mb-12")}
      <p class="small">You completed 12 Clubbell sessions in this phase. Choose whether to advance or repeat before generating the next Clubbell day.</p>
      <div class="finish-row">
        <button id="btnGateNextPhase" class="btn good">Next phase</button>
        <button id="btnGateRepeatPhase" class="btn">Repeat phase</button>
      </div>`;
    renderRightNone();
    setModePill("-");
    setDayPill("checkpoint");
    document.getElementById("btnGateNextPhase").onclick = () => { advanceProgressDecision('next'); boot(); };
    document.getElementById("btnGateRepeatPhase").onclick = () => { advanceProgressDecision('repeat'); boot(); };
  }

  function renderGate(existing){
    const _raw = existing?.scores ?? { soreness:null, energy:null, sleep:null };
    const scores = { soreness:_raw.soreness, energy:_raw.energy, sleep:_raw.sleep };

    leftCard.innerHTML = `
      <h2>Recovery Check</h2>
      <div class="gate-grid">
        ${gateDef.map(g => `
          <div class="gate-row">
            <div class="label">${g.label}</div>
            <div class="score-row" data-gkey="${g.key}">
              ${[0,1,2,3,4,5].map(n => `<button type="button" class="score-btn" data-score="${n}" aria-label="Score ${n}">${n}</button>`).join('')}
            </div>
            <div class="score-label" id="lbl-${g.key}">-</div>
          </div>
        `).join('')}
        <div class="total">
          <div>
            <div class="label">Total</div>
            <div class="n" id="totalN">0</div>
          </div>
          <div id="band" class="badge">-</div>
        </div>
        <div class="row">
          <button id="btnGenerate" class="btn primary" disabled>Generate session</button>
          <span class="small">0-8 = Intu only | 9-11 = 15 min fallback | 12-15 = normal session duration (15/20/25/30) | Clubbell is the default, Animal Flow only follows a completed Clubbell day</span>
        </div>
      </div>
    `;

    const totalEl = document.getElementById('totalN');
    const bandEl = document.getElementById('band');
    const btnGenerate = document.getElementById('btnGenerate');

    function updateUI(){
      const vals = Object.values(scores);
      const complete = vals.every(v => typeof v === 'number');
      const total = vals.reduce((a,b) => a + (typeof b==='number' ? b : 0), 0);
      totalEl.textContent = String(total);
      const b = computeBand(total);
      bandEl.className = `badge ${b.cls}`;
      bandEl.textContent = b.label;
      gateDef.forEach(g => {
        const v = scores[g.key];
        const el = document.getElementById(`lbl-${g.key}`);
        el.textContent = typeof v === 'number' ? g.choices[v] : '-';
      });
      btnGenerate.disabled = !complete;
    }

    gateDef.forEach(g => {
      const v = scores[g.key];
      if(typeof v !== "number") return;
      const row = leftCard.querySelector(`.score-row[data-gkey="${g.key}"]`);
      const btn = row?.querySelector(`.score-btn[data-score="${v}"]`);
      if(btn) btn.classList.add("active");
    });

    document.querySelectorAll('.score-row').forEach(row => {
      row.addEventListener('click', (e) => {
        const t = e.target;
        if(!t.classList.contains('score-btn')) return;
        const key = row.dataset.gkey;
        const v = Number(t.dataset.score);
        scores[key] = v;
        row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        updateUI();
      });
    });

    btnGenerate.onclick = () => {
      const total = Object.values(scores).reduce((a,b)=>a+b,0);
      const band = computeBand(total).band;
      const session = generateSession(band, total);
      renderSession(session);
    };



    updateUI();
    renderRightNone();
    setModePill("-");
    setDayPill("new");
  }

  function migrateLegacyStorage(day){
    if(day && (loadJSON(LS_DAY_LEGACY) || loadJSON(LS_DAY_LEGACY_2))){
      saveDay(day);
      removeStorageKeys([LS_DAY_LEGACY, LS_DAY_LEGACY_2]);
    }
    if((loadJSON(LS_LAST_LEGACY) || loadJSON(LS_LAST_LEGACY_2)) && !loadJSON(LS_LAST)){
      saveLast(loadLast());
      removeStorageKeys([LS_LAST_LEGACY, LS_LAST_LEGACY_2]);
    }
    if(loadJSON(LS_COMPLETED_LEGACY) && !loadJSON(LS_COMPLETED)){
      saveCompleted(loadCompleted());
      removeStorageKeys([LS_COMPLETED_LEGACY]);
    }
  }

  function boot(){
    const day = loadDay();
    migrateLegacyStorage(day);
    renderSettings();
    if(day){
      btnMain.textContent = "Open session";
      renderSession(day);
    } else {
      btnMain.textContent = "Start";
      if(loadProgressCached().awaitingDecision) renderPhaseDecision();
      else renderGate(null);
    }
  }

  btnMain.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === 'today'));
    document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
    document.getElementById('panel-today')?.classList.add('active');
    boot();
  };
  btnReset.onclick = async () => {
    cachedDay = null;
    removeStorageKeys(DAY_KEYS);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    boot();
  };


  setWakePill(false);
  initTabs();
  boot();
})();
</script>
</body>
