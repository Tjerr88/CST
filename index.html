<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CST Generator v3.8</title>
<style>
  :root{
    --bg:#0e1116;
    --surface:#131821;
    --surface2:#10151d;
    --text:#e7edf6;
    --muted:#aab4c4;
    --line:#253042;
    --acc:#7aa7ff;
    --good:#5fd08a;
    --mid:#e0b45c;
    --rec:#7aa7ff;
    --warn:#ffcc66;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:14px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:var(--bg); color:var(--text);
  }
  .wrap{max-width:980px; margin:0 auto; display:grid; gap:12px}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
  }
  .grid{display:grid; grid-template-columns:1fr; gap:12px}
  @media (min-width: 880px){ .grid{ grid-template-columns: 1.2fr .8fr; } }
  h1{font-size:20px; margin:0 0 6px}
  h2{font-size:15px; margin:0 0 8px}
  p{margin:0; color:var(--muted); line-height:1.35; font-size:13px}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .btn{
    appearance:none; border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04); color:var(--text);
    border-radius:12px; padding:12px 14px; font-weight:850; cursor:pointer;
    min-height:46px;
  }
  .btn.primary{border-color: rgba(122,167,255,0.45); background: rgba(122,167,255,0.10);}
  .btn.danger{border-color: rgba(255,120,120,0.40); background: rgba(255,120,120,0.10);}
  .btn.good{border-color: rgba(95,208,138,0.45); background: rgba(95,208,138,0.10);}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .btn:focus-visible,
  .score-btn:focus-visible,
  .accordion-header:focus-visible{
    outline:2px solid var(--acc);
    outline-offset:2px;
  }
  .pill{
    display:inline-flex; gap:6px; align-items:center; padding:6px 10px; border-radius:999px;
    border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03);
    color:var(--muted); font-size:12px;
  }
  .pill strong{color:var(--text)}
  .exercise{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:12px;
    padding:10px 12px;
    display:flex; gap:10px; justify-content:space-between; align-items:flex-start;
  }
  .ex-left{display:grid; gap:3px}
  .ex-title{font-weight:850}
  .ex-meta{color:var(--muted); font-size:12px}
  .label{color:var(--muted); font-size:12px}
  .time{font-variant-numeric: tabular-nums; font-size:52px; font-weight:900; letter-spacing:.5px; line-height:1;}
  .stage-title{font-size:18px; font-weight:900; margin-bottom:4px;}
  .hr{height:1px; background:var(--line); margin:12px 0;}
  .small{font-size:12px; color:var(--muted)}
  .gate-grid{display:grid; gap:12px}
  .gate-row{display:grid; gap:8px}
  .score-row{display:flex; gap:8px; flex-wrap:wrap}
  .score-btn{
    appearance:none;
    width:48px; height:42px; display:inline-flex; justify-content:center; align-items:center;
    border-radius:12px; border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.06); color:var(--text);
    font-weight:900; cursor:pointer; user-select:none;
  }
  .score-btn.active{
    border-color: rgba(255, 157, 46, 0.55);
    background: linear-gradient(180deg, rgba(255, 157, 46, 0.22), rgba(255, 157, 46, 0.10));
    transform: scale(1.08);
  }
  .score-label{margin-top:6px; min-height:18px; font-size:12px; color:var(--muted); font-weight:600}
  .total{
    display:flex; gap:10px; align-items:center; justify-content:space-between;
    border:1px solid var(--line); background:var(--surface2); border-radius:12px; padding:10px 12px;
  }
  .total .n{font-size:28px; font-weight:900; font-variant-numeric: tabular-nums}
  .badge{
    padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900;
    border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.04); color:var(--muted);
  }
  .badge.good{ color: rgba(55,214,122,1); border-color: rgba(55,214,122,.4); background: rgba(55,214,122,.08); }
  .badge.mid{ color: rgba(255,176,32,1); border-color: rgba(255,176,32,.4); background: rgba(255,176,32,.08); }
  .badge.rec{ color: rgba(83,166,255,1); border-color: rgba(83,166,255,.45); background: rgba(83,166,255,.10); }

  .accordion{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:12px;
    overflow:hidden;
    margin-top:10px;
  }
  .accordion-header{
    width:100%;
    appearance:none;
    border:0;
    background:transparent;
    color:var(--text);
    padding:12px 14px;
    font-weight:850;
    text-align:left;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .accordion-header:hover,
  .accordion-header:focus-visible{ background:rgba(255,255,255,.03); }
  .accordion-header::after{
    content:"\25B6";
    color:var(--muted);
    transition:transform .2s ease;
    flex:0 0 auto;
  }
  .accordion.active .accordion-header::after{
    transform:rotate(90deg);
  }
  .accordion-content{
    display:none;
    padding:0 12px 12px;
    border-top:1px solid var(--line);
  }
  .accordion.active .accordion-content{
    display:block;
  }

  .timeline{
    display:grid;
    gap:8px;
    margin-top:12px;
  }
  .stage-pill{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--surface2);
    color:var(--muted);
    font-size:13px;
  }
  .stage-pill.active{
    border-color: rgba(122,167,255,0.45);
    background: rgba(122,167,255,0.10);
    color:var(--text);
  }
  .stage-pill.done{
    border-color: rgba(95,208,138,0.45);
    background: rgba(95,208,138,0.08);
    color:var(--text);
  }
  .beep-pill{
    color:var(--warn);
    border-color: rgba(255,204,102,.4);
    background: rgba(255,204,102,.08);
  }
  .mt-10{margin-top:10px}
  .mt-12{margin-top:12px}
  .mb-10{margin-bottom:10px}
  .mb-12{margin-bottom:12px}
  .stack-10{display:grid; gap:10px}
  .stack-10.mt-12{margin-top:12px}



</style>
</head>

  if(clubType === "double") return modes.includes("double");
  if(clubType === "2h") return modes.includes("2h");
  return true;
}

  function todayKey(){
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function loadJSON(k){ try{ const r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch { return null; } }
  function saveJSON(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
  function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function computeBand(total){
    if(total >= 13) return { band:'20', label:'13-15', cls:'good', minutes:20, intuOnly:false };
    if(total >= 9)  return { band:'15', label:'9-12', cls:'mid', minutes:15, intuOnly:false };
    return { band:'intu-only', label:'0-8', cls:'rec', minutes:0, intuOnly:true };
  }
  function formatModeLabel(mode){
    if(mode === "INTU ONLY") return "Intu only";
    if(mode === "CLUBBELL DAY") return "Clubbell day";
    if(mode === "STAND-ALONE FLOW DAY") return "Stand-alone flow day";
    return mode || "-";
  }
  function setModePill(mode){ modePill.innerHTML = `Mode: <strong>${cleanText(formatModeLabel(mode))}</strong>`; }
  function setDayPill(state){ dayPill.innerHTML = `Today: <strong>${state || 'new'}</strong>`; }
  function setWakePill(on){ wakePill.innerHTML = `Wake Lock: <strong>${on ? 'on' : 'off'}</strong>`; }
  function fmt(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  }
  function fmtMin(sec){ return sec ? Math.round(sec/60) + " min" : "-"; }
  function cleanText(value){
    return String(value ?? "")
      .replaceAll("â€”", "-")
      .replace(/\bOke\b/g, "OK")
      .replace(/\bfull-body\b/gi, "full body")
      .replace(/\bper kant\b/gi, "per side")
      .replace(/\bper schouder\b/gi, "per shoulder")
      .replace(/\bcirkels per arm\b/gi, "circles per arm")
      .replace(/\bper hand\b/gi, "per hand")
      .replace(/\bop en neer\b/gi, "up and down")
      .replace(/\bper richting\b/gi, "per direction")
      .replace(/\bper voet\b/gi, "per foot");
  }

  function getDefaultLastState(){
    return { lastClubType:null, decompBag:[], standaloneBag:[] };
  }

  function loadDay(){
    const a = loadJSON(LS_DAY) || loadJSON(LS_DAY_LEGACY);
    if(!a || a.day !== todayKey()) return null;
    return a;
  }
  function saveDay(day){ saveJSON(LS_DAY, day); }
  function loadLast(){
    return {
      ...getDefaultLastState(),
      ...(loadJSON(LS_LAST) || loadJSON(LS_LAST_LEGACY) || {})
    };
  }
  function saveLast(v){ saveJSON(LS_LAST, v); }

  function dayNumberFromKey(key){
    const [y,m,d] = key.split("-").map(Number);
    return Math.floor(Date.UTC(y, m-1, d) / 86400000);
  }

  function calendarDayType(key){
    return dayNumberFromKey(key) % 2 === 0 ? 'clubbell' : 'standalone';
  }

  function nextFullClubType(){
    const last = loadLast();
    const previousType = last.lastClubType || null;
    const pool = CLUB_TYPE_WEIGHTS.filter(x => x.type !== previousType);

    const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
    let roll = Math.random() * totalWeight;

    for(const item of pool){
      if(roll < item.weight){
        return item.type;
      }
      roll -= item.weight;
    }

    return pool.length ? pool[pool.length - 1].type : "single";
  }

  const DECOMP_FLOW_BY_ID = new Map(DECOMP_FLOWS.map(flow => [flow.id, flow]));
  const STANDALONE_FLOW_BY_ID = new Map(STANDALONE_FLOWS.map(flow => [flow.id, flow]));
  const FLOW_FOCUS_BY_ID = {
    hip_melt:"hip",
    hip_engine:"hip",
    squat_flow:"hip",
    lunge_wave:"hip",
    spine_soother:"spine",
    spine_engine:"spine",
    twist_wave:"spine",
    open_exhale:"open",
    open_engine:"open",
    dog_line:"open",
    floor_unwind:"floor",
    floor_to_stand:"floor",
    standing_ease:"standing",
    balance_chain:"standing"
  };

  function deriveFlowFocusKey(flow){
    return flow?.id ? (FLOW_FOCUS_BY_ID[flow.id] || null) : null;
  }

  function nextDecompFlow(excludedFocusKey = null){
    const last = loadLast();
    let bag = Array.isArray(last.decompBag) ? last.decompBag.slice() : [];
    if(!bag.length){
      bag = shuffle(DECOMP_FLOWS.map(x => x.id));
    }

    let flowId = bag.find(id => {
      const flow = DECOMP_FLOW_BY_ID.get(id);
      return !excludedFocusKey || deriveFlowFocusKey(flow) !== excludedFocusKey;
    });

    if(flowId){
      bag = bag.filter(id => id !== flowId);
    } else {
      bag = shuffle(DECOMP_FLOWS.map(x => x.id));
      bag = bag.filter(id => {
        const flow = DECOMP_FLOW_BY_ID.get(id);
        return !excludedFocusKey || deriveFlowFocusKey(flow) !== excludedFocusKey;
      });
      flowId = bag.shift();
    }

    last.decompBag = bag;
    saveLast(last);
    return DECOMP_FLOW_BY_ID.get(flowId) || DECOMP_FLOWS[0];
  }

  function nextStandaloneFlow(){
    const last = loadLast();
    let bag = Array.isArray(last.standaloneBag) ? last.standaloneBag.slice() : [];
    if(!bag.length){
      bag = shuffle(STANDALONE_FLOWS.map(x => x.id));
    }
    const flowId = bag.shift();
    last.standaloneBag = bag;
    saveLast(last);
    return STANDALONE_FLOW_BY_ID.get(flowId) || STANDALONE_FLOWS[0];
  }



  function generateClubExercises(clubType){
    const sequence = ["Rhythmic", "Ballistic", "Grinding"]
      .map(bucket => {
        const pool = clubPool(bucket, clubType);
        const pick = pool.length ? rand(pool) : null;
        return pick ? { bucket, exercise:pick.name } : null;
      })
      .filter(Boolean);

    return {
      sequence,
      flow: sequence.map(x => x.exercise).join(" -> ")
    };
  }


  function buildStages(session){
    const stages = [];
    if(session.dayType === 'clubbell'){
      stages.push({ key:'club', label:`Clubbell | ${fmtMin(session.blockTimes.club)}`, seconds:session.blockTimes.club });
      stages.push({ key:'decomp', label:`Decompress | ${fmtMin(session.blockTimes.decomp)}`, seconds:session.blockTimes.decomp });
    } else if(session.dayType === 'standalone'){
      stages.push({ key:'active', label:`Stand-alone flow | ${fmtMin(session.blockTimes.active)}`, seconds:session.blockTimes.active });
      stages.push({ key:'decomp', label:`Decompress | ${fmtMin(session.blockTimes.decomp)}`, seconds:session.blockTimes.decomp });
    }
    return stages;
  }

  function generateSession(mode, total){
    const last = loadLast();
    const band = computeBand(total);
    const dayType = calendarDayType(todayKey());

    const session = {
      day: todayKey(),
      total,
      modeRequested: mode,
      mode: band.intuOnly ? 'INTU ONLY' : (dayType === 'clubbell' ? 'CLUBBELL DAY' : 'STAND-ALONE FLOW DAY'),
      dayType,
      intuOnly: band.intuOnly,
      delayedPlannedDay: band.intuOnly,
      intu: intu.slice(),
      club: null,
      activeFlow: null,
      decompFlow: null,
      blockTimes: { intu: 8 * 60, club: 0, active: 0, decomp: 0 },
      stages: [],
      currentStageIndex: 0,
      currentStageLeft: 0,
      isRunning: false,
      lastCountdownBeep: null
    };

    if(band.intuOnly){
      saveLast(last);
    } else if(dayType === 'clubbell'){
      const clubType = nextFullClubType();
      const clubPlan = generateClubExercises(clubType);
      const flow = nextDecompFlow();
      session.club = {
        clubType,
        sequence: clubPlan.sequence,
        flow: clubPlan.flow
      };
      session.decompFlow = {
        id: flow.id,
        name: flow.name,
        focus: flow.focus,
        use: flow.use,
        sequence: (band.minutes === 20 ? flow.sequence7 : flow.sequence5).slice(),
        bagType: 'Decompress'
      };
      session.blockTimes.club = band.minutes * 60;
      session.blockTimes.decomp = (band.minutes === 20 ? 10 : 5) * 60;
      const lastState = loadLast();
      saveLast({
        lastClubType: clubType,
        decompBag: lastState.decompBag,
        standaloneBag: lastState.standaloneBag
      });
    } else {
      const activeFlow = nextStandaloneFlow();
      const decompFlow = nextDecompFlow(deriveFlowFocusKey(activeFlow));
      session.activeFlow = {
        id: activeFlow.id,
        name: activeFlow.name,
        focus: activeFlow.focus,
        use: activeFlow.use,
        sequence: (band.minutes === 20 ? activeFlow.sequence10 : activeFlow.sequence8).slice(),
        bagType: 'Stand-alone'
      };
      session.decompFlow = {
        id: decompFlow.id,
        name: decompFlow.name,
        focus: decompFlow.focus,
        use: decompFlow.use,
        sequence: (band.minutes === 20 ? decompFlow.sequence7 : decompFlow.sequence5).slice(),
        bagType: 'Decompress'
      };
      session.blockTimes.active = band.minutes * 60;
      session.blockTimes.decomp = (band.minutes === 20 ? 10 : 5) * 60;
      const lastState = loadLast();
      saveLast({
        lastClubType: last.lastClubType || null,
        decompBag: lastState.decompBag,
        standaloneBag: lastState.standaloneBag
      });
    }

    session.stages = buildStages(session);
    session.currentStageLeft = session.stages.length ? session.stages[0].seconds : 0;

    saveDay(session);
    return session;
  }

  function bindAccordions(){
    const headers = leftCard.querySelectorAll('.accordion-header');
    headers.forEach((btn, index) => {
      const parent = btn.closest('.accordion');
      const content = parent?.querySelector('.accordion-content');
      const contentId = `accordion-content-${index}`;
      if(content){
        content.id = contentId;
        btn.setAttribute("aria-controls", contentId);
      }
      btn.setAttribute("aria-expanded", String(parent?.classList.contains('active') || false));
      btn.addEventListener('click', () => {
        const parent = btn.closest('.accordion');
        const isOpen = parent.classList.contains('active');
        leftCard.querySelectorAll('.accordion').forEach(acc => {
          acc.classList.remove('active');
          const header = acc.querySelector('.accordion-header');
          if(header) header.setAttribute("aria-expanded", "false");
        });
        if(!isOpen){
          parent.classList.add('active');
          btn.setAttribute("aria-expanded", "true");
        }
      });
    });
  }

  function getCurrentStage(session){
    if(!session || !session.stages || !session.stages.length) return null;
    return session.stages[session.currentStageIndex] || null;
  }

  function renderRightNone(){
    rightInner.innerHTML = `<h2>Status</h2><p class="small">No active timer.</p>`;
  }

  function syncRightPanel(s){
    if(!s){
      renderRightNone();
      return;
    }

    const current = getCurrentStage(s);
    const next = s.stages[s.currentStageIndex + 1] || null;
    const currentLabel = document.getElementById("currentStageLabel");
    const timeDisplay = document.getElementById("timeDisplay");
    const playPauseBtn = document.getElementById("btnPlayPause");
    const nextStageMeta = document.getElementById("nextStageMeta");

    if(!currentLabel || !timeDisplay || !playPauseBtn || !nextStageMeta){
      renderRightPanel(s);
      return;
    }

    currentLabel.textContent = current ? current.label : "-";
    timeDisplay.textContent = fmt(s.currentStageLeft || 0);
    playPauseBtn.textContent = s.isRunning ? "Pause" : "Start";
    nextStageMeta.textContent = next ? next.label : "You are done after this block.";

    document.querySelectorAll(".stage-pill").forEach((pill, idx) => {
      pill.classList.remove("active", "done");
      if(idx < s.currentStageIndex) pill.classList.add("done");
      else if(idx === s.currentStageIndex) pill.classList.add("active");

      const timeEl = pill.querySelector(".stage-time");
      if(timeEl){
        timeEl.textContent = idx < s.currentStageIndex ? "OK" : idx === s.currentStageIndex ? fmt(s.currentStageLeft) : fmt(s.stages[idx].seconds);
      }
    });
  }

  function renderRightPanel(session = loadDay()){
    const s = session;
    if(!s){
      renderRightNone();
      return;
    }

    const current = getCurrentStage(s);
    const next = s.stages[s.currentStageIndex + 1] || null;

    rightInner.innerHTML = `
      <h2>Timer</h2>
      <div class="label">Current block</div>
      <div id="currentStageLabel" class="stage-title">${current ? current.label : "-"}</div>
      <div id="timeDisplay" class="time">${fmt(s.currentStageLeft || 0)}</div>

      <div class="row mt-12">
        <button id="btnPlayPause" class="btn primary">${s.isRunning ? "Pause" : "Start"}</button>

      </div>

      <div class="timeline">
        ${s.stages.map((st, idx) => {
          let cls = "";
          if(idx < s.currentStageIndex) cls = "done";
          else if(idx === s.currentStageIndex) cls = "active";
          return `<div class="stage-pill ${cls}">
            <span>${st.label}</span>
            <strong class="stage-time">${idx < s.currentStageIndex ? "OK" : idx === s.currentStageIndex ? fmt(s.currentStageLeft) : fmt(st.seconds)}</strong>
          </div>`;
        }).join("")}
      </div>

      <div class="small mt-12">Clear beeps at 3-2-1, on block change, and at the end. Wake Lock tries to keep your screen active while the timer is running.</div>

    document.getElementById("btnPlayPause").onclick = () => {
      const d = loadDay();
      if(!d) return;
      if(d.isRunning) pauseSequence();
      else startSequence();

    document.getElementById("btnNextStage").onclick = () => advanceStage(true);
    document.getElementById("btnResetTimer").onclick = resetSequence;
  }

  async function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended"){
      await audioCtx.resume();
    }
  }

  async function beep(freq=880, duration=0.12, volume=0.06){
    try{
      await ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
  }

  async function patternCountdown(n){
    const map = {3:740,2:840,1:980};
    await beep(map[n] || 880, 0.14, 0.08);
  }
  async function patternStageChange(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.14,0.08), 150);
  }
  async function patternDone(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.12,0.08), 150);
    setTimeout(() => beep(1568,0.18,0.08), 300);
  }

  async function acquireWakeLock(){
    try{
      if("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
        setWakePill(true);
        wakeLock.addEventListener("release", () => setWakePill(false));
      }
    } catch(e){
      setWakePill(false);
    }
  }
  async function releaseWakeLock(){
    try{
      if(wakeLock){
        await wakeLock.release();
        wakeLock = null;
      }
    } catch(e){}
    setWakePill(false);
  }

  document.addEventListener("visibilitychange", async () => {
    const s = loadDay();
    if(document.visibilityState === "visible" && s?.isRunning){
      await acquireWakeLock();
    }
  });

  function startTick(){
    if(timer) clearInterval(timer);
    timer = setInterval(async () => {
      const d = loadDay();
      if(!d || !d.isRunning) return;
      const cur = getCurrentStage(d);
      if(!cur) return;

      if(d.currentStageLeft > 0){
        d.currentStageLeft -= 1;

        if([3,2,1].includes(d.currentStageLeft) && d.lastCountdownBeep !== d.currentStageLeft){
          d.lastCountdownBeep = d.currentStageLeft;
          saveDay(d);
          syncRightPanel(d);
          await patternCountdown(d.currentStageLeft);
          return;
        }
      }

      if(d.currentStageLeft <= 0){
        d.isRunning = false;
        saveDay(d);
        syncRightPanel(d);
        await advanceStage(false);
        return;
      }

      saveDay(d);
      syncRightPanel(d);
    }, 1000);
  }

  async function startSequence(){
    const d = loadDay();
    if(!d) return;
    d.isRunning = true;
    d.lastCountdownBeep = null;
    saveDay(d);
    await ensureAudio();
    await acquireWakeLock();
    renderRightPanel();
    startTick();
  }

  async function pauseSequence(){
    const d = loadDay();
    if(!d) return;
    d.isRunning = false;
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  async function advanceStage(manual){
    const d = loadDay();
    if(!d) return;
    const atLast = d.currentStageIndex >= d.stages.length - 1;

    if(atLast){
      d.isRunning = false;
      saveDay(d);
      if(timer) clearInterval(timer);
      timer = null;
      renderRightPanel();
      await releaseWakeLock();
      await patternDone();
      return;
    }

    d.currentStageIndex += 1;
    d.currentStageLeft = d.stages[d.currentStageIndex].seconds;
    d.lastCountdownBeep = null;
    if(!manual) d.isRunning = true;
    saveDay(d);
    renderRightPanel();
    await patternStageChange();

    if(manual){
      d.isRunning = false;
      saveDay(d);
      renderRightPanel();
    } else {
      startTick();
    }
  }

  async function resetSequence(){
    const d = loadDay();
    if(!d) return;
    d.currentStageIndex = 0;
    d.currentStageLeft = d.stages.length ? d.stages[0].seconds : 0;
    d.isRunning = false;
    d.lastCountdownBeep = null;
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  function renderGate(existing){
    const _raw = existing?.scores ?? { soreness:null, energy:null, sleep:null };
    const scores = { soreness:_raw.soreness, energy:_raw.energy, sleep:_raw.sleep };

    leftCard.innerHTML = `
      <h2>Recovery Check</h2>
      <div class="gate-grid">
        ${gateDef.map(g => `
          <div class="gate-row">
            <div class="label">${g.label}</div>
            <div class="score-row" data-gkey="${g.key}">
              ${[0,1,2,3,4,5].map(n => `<button type="button" class="score-btn" data-score="${n}" aria-label="Score ${n}">${n}</button>`).join('')}
            </div>
            <div class="score-label" id="lbl-${g.key}">-</div>
          </div>
        `).join('')}
        <div class="total">
          <div>
            <div class="label">Total</div>
            <div class="n" id="totalN">0</div>
          </div>
          <div id="band" class="badge">-</div>
        </div>
        <div class="row">
          <button id="btnGenerate" class="btn primary" disabled>Generate session</button>
          <span class="small">0-8 = Intu only | 9-12 = 15 min | 13-15 = 20 min | the day type follows the calendar date</span>
        </div>
      </div>
    `;

    const totalEl = document.getElementById('totalN');
    const bandEl = document.getElementById('band');
    const btnGenerate = document.getElementById('btnGenerate');

    function updateUI(){
      const vals = Object.values(scores);
      const complete = vals.every(v => typeof v === 'number');
      const total = vals.reduce((a,b) => a + (typeof b==='number' ? b : 0), 0);
      totalEl.textContent = String(total);
      const b = computeBand(total);
      bandEl.className = `badge ${b.cls}`;
      bandEl.textContent = b.label;
      gateDef.forEach(g => {
        const v = scores[g.key];
        const el = document.getElementById(`lbl-${g.key}`);
        el.textContent = typeof v === 'number' ? g.choices[v] : '-';
      });
      btnGenerate.disabled = !complete;
    }

    document.querySelectorAll('.score-row').forEach(row => {
      row.addEventListener('click', (e) => {
        const t = e.target;
        if(!t.classList.contains('score-btn')) return;
        const key = row.dataset.gkey;
        const v = Number(t.dataset.score);
        scores[key] = v;
        row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        updateUI();
      });
    });

    btnGenerate.onclick = () => {
      const total = Object.values(scores).reduce((a,b)=>a+b,0);
      const band = computeBand(total).band;
      const session = generateSession(band, total);
      renderSession(session);
    };



    updateUI();
    renderRightNone();
    setModePill("-");
    setDayPill("new");
  }

  function boot(){
    const day = loadDay();
    if(day && loadJSON(LS_DAY_LEGACY)){
      saveDay(day);
      localStorage.removeItem(LS_DAY_LEGACY);
    }
    if(loadJSON(LS_LAST_LEGACY) && !loadJSON(LS_LAST)){
      saveLast(loadLast());
      localStorage.removeItem(LS_LAST_LEGACY);
    }
    if(day){
      btnMain.textContent = "Open session";
      renderSession(day);
    } else {
      btnMain.textContent = "Start";
      renderGate(null);
    }
  }

  btnMain.onclick = boot;
  btnReset.onclick = async () => {
    localStorage.removeItem(LS_DAY);
    localStorage.removeItem(LS_DAY_LEGACY);
    localStorage.removeItem(LS_LAST);
    localStorage.removeItem(LS_LAST_LEGACY);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    boot();
  };


  setWakePill(false);
  boot();
})();
</script>
</body>
</html>
