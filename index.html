<title>CST Generator v3.4</title>
<style>

    --surface:#131821;
    --surface2:#10151d;

    --muted:#aab4c4;
    --line:#253042;
    --acc:#7aa7ff;
    --good:#5fd08a;
    --mid:#e0b45c;
    --rec:#7aa7ff;
    --warn:#ffcc66;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:14px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:var(--bg); color:var(--text);
  }
  .wrap{max-width:980px; margin:0 auto; display:grid; gap:12px}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
  }
  .grid{display:grid; grid-template-columns:1fr; gap:12px}
  @media (min-width: 880px){ .grid{ grid-template-columns: 1.2fr .8fr; } }
  h1{font-size:20px; margin:0 0 6px}
  h2{font-size:15px; margin:0 0 8px}
  p{margin:0; color:var(--muted); line-height:1.35; font-size:13px}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .btn{
    appearance:none; border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04); color:var(--text);
    border-radius:12px; padding:12px 14px; font-weight:850; cursor:pointer;
    min-height:46px;
  }
  .btn.primary{border-color: rgba(122,167,255,0.45); background: rgba(122,167,255,0.10);}
  .btn.danger{border-color: rgba(255,120,120,0.40); background: rgba(255,120,120,0.10);}
  .btn.good{border-color: rgba(95,208,138,0.45); background: rgba(95,208,138,0.10);}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .pill{
    display:inline-flex; gap:6px; align-items:center; padding:6px 10px; border-radius:999px;
    border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03);
    color:var(--muted); font-size:12px;
  }
  .pill strong{color:var(--text)}
  .exercise{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:12px;
    padding:10px 12px;
    display:flex; gap:10px; justify-content:space-between; align-items:flex-start;
  }
  .ex-left{display:grid; gap:3px}
  .ex-title{font-weight:850}
  .ex-meta{color:var(--muted); font-size:12px}
  .label{color:var(--muted); font-size:12px}
  .time{font-variant-numeric: tabular-nums; font-size:52px; font-weight:900; letter-spacing:.5px; line-height:1;}
  .stage-title{font-size:18px; font-weight:900; margin-bottom:4px;}
  .hr{height:1px; background:var(--line); margin:12px 0;}
  .small{font-size:12px; color:var(--muted)}
  .gate-grid{display:grid; gap:12px}
  .gate-row{display:grid; gap:8px}
  .score-row{display:flex; gap:8px; flex-wrap:wrap}
  .score-btn{
    width:48px; height:42px; display:inline-flex; justify-content:center; align-items:center;
    border-radius:12px; border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.06); color:var(--text);
    font-weight:900; cursor:pointer; user-select:none;
  }
  .score-btn.active{
    border-color: rgba(255, 157, 46, 0.55);
    background: linear-gradient(180deg, rgba(255, 157, 46, 0.22), rgba(255, 157, 46, 0.10));
    transform: scale(1.08);
  }
  .score-label{margin-top:6px; min-height:18px; font-size:12px; color:var(--muted); font-weight:600}
  .total{
    display:flex; gap:10px; align-items:center; justify-content:space-between;
    border:1px solid var(--line); background:var(--surface2); border-radius:12px; padding:10px 12px;
  }
  .total .n{font-size:28px; font-weight:900; font-variant-numeric: tabular-nums}
  .badge{
    padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900;
    border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.04); color:var(--muted);

  .badge.good{ color: rgba(55,214,122,1); border-color: rgba(55,214,122,.4); background: rgba(55,214,122,.08); }
  .badge.mid{ color: rgba(255,176,32,1); border-color: rgba(255,176,32,.4); background: rgba(255,176,32,.08); }
  .badge.rec{ color: rgba(83,166,255,1); border-color: rgba(83,166,255,.45); background: rgba(83,166,255,.10); }

  .accordion{
    border:1px solid var(--line);
    background:var(--surface2);
    border-radius:12px;
    overflow:hidden;
    margin-top:10px;
  }
  .accordion-header{
    width:100%;
    appearance:none;
    border:0;
    background:transparent;
    color:var(--text);
    padding:12px 14px;
    font-weight:850;
    text-align:left;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .accordion-header:hover{ background:rgba(255,255,255,.03); }
  .accordion-header::after{
    content:"▶";
    color:var(--muted);
    transition:transform .2s ease;
    flex:0 0 auto;
  }
  .accordion.active .accordion-header::after{
    transform:rotate(90deg);
  }
  .accordion-content{
    display:none;
    padding:0 12px 12px;
    border-top:1px solid var(--line);
  }
  .accordion.active .accordion-content{
    display:block;
  }

  .timeline{
    display:grid;
    gap:8px;
    margin-top:12px;
  }
  .stage-pill{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border-radius:12px;

    color:var(--text);

  .beep-pill{

function clubCompatible(exercise, clubType){
  const modes = exercise.modes || ["single","double"];
  if(clubType === "single") return modes.includes("single");
  if(clubType === "double") return modes.includes("double");
  if(clubType === "2h") return modes.includes("2h");
  return true;
}

function clubPool(bucket, clubType){
  return CLUB_EXERCISES.filter(x => x.bucket === bucket && clubCompatible(x, clubType));
}

function clubPositionLabel(pos){
  return CLUB_POSITION_LABELS[pos] || pos || "-";
}

function clubBridge(fromPos, toPos){
  if(!fromPos || !toPos || fromPos === toPos) return null;
  const specific = {
    "back->shoulder":"Half clean return: Back -> Shoulder Park",
    "back->order":"Half clean return: Back -> Order",
    "back->ready":"Return from Back -> Ready",
    "flag->shoulder":"Half return: Flag -> Shoulder Park",
    "flag->order":"Half return: Flag -> Order",
    "flag->ready":"Half return: Flag -> Ready",
    "guard->order":"Half return: Guard -> Order",
    "guard->ready":"Return from Guard -> Ready",
    "shoulder->order":"Half clean drop: Shoulder Park -> Order",
    "shoulder->ready":"Return from Shoulder Park -> Ready",
    "order->shoulder":"Half clean rise: Order -> Shoulder Park",
    "order->ready":"Return from Order -> Ready",
    "order->torch":"Drive to Torch",
    "torch->order":"Lower from Torch -> Order",
    "torch->ready":"Lower from Torch -> Ready",
    "ready->order":"Front clean to Order",
    "ready->shoulder":"Front clean to Shoulder Park",
    "ready->flag":"Front clean to Flag",
    "ready->guard":"Side clean to Guard",
    "ready->back":"Front clean to Back"
  };
  const key = `${fromPos}->${toPos}`;
  return {
    type:"bridge",
    label: specific[key] || `Half transition: ${clubPositionLabel(fromPos)} -> ${clubPositionLabel(toPos)}`,
    from: fromPos,
    to: toPos
  };
}

function pickClubExercise(pool, currentPosition, usedNames){
  const unused = pool.filter(x => !usedNames.includes(x.name));
  const exact = unused.filter(x => x.start === currentPosition);
  if(exact.length) return rand(exact);
  const readyStart = unused.filter(x => x.start === "ready");
  if(readyStart.length) return rand(readyStart);
  if(unused.length) return rand(unused);
  const exactUsed = pool.filter(x => x.start === currentPosition);
  if(exactUsed.length) return rand(exactUsed);
  return pool.length ? rand(pool) : null;
}

  function todayKey(){
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function loadJSON(k){ try{ const r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch { return null; } }
  function saveJSON(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
  function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }
  function pickFamilies(obj, count){ return shuffle(Object.keys(obj)).slice(0, count); }
  function normalize(x){ return x.toLowerCase(); }
  function isTwoHanded(x){ const s = normalize(x); return s.includes("two-handed") || s.includes("two handed"); }
  function isDouble(x){ return normalize(x).includes("double"); }
  function isAlternating(x){ return normalize(x).includes("alternating"); }
  function filterSingle(arr){ return arr.filter(x => !isTwoHanded(x) && !isDouble(x) && !isAlternating(x)); }
  function filterDouble(arr){ return arr.filter(x => !isTwoHanded(x)); }
  function filter2H(arr){ return arr.filter(x => isTwoHanded(x)); }
  function pickExercise(arr, clubType){
    let pool = [];
    if(clubType === "single") pool = filterSingle(arr);
    if(clubType === "double") pool = filterDouble(arr);
    if(clubType === "2h") pool = filter2H(arr);
    return pool.length ? rand(pool) : null;
  }

  function computeBand(total){
    if(total >= 13) return { band:'20', label:'13-15', cls:'good', minutes:20, intuOnly:false };
    if(total >= 9)  return { band:'15', label:'9-12', cls:'mid', minutes:15, intuOnly:false };
    return { band:'intu-only', label:'0-8', cls:'rec', minutes:0, intuOnly:true };
  }
  function setModePill(mode){ modePill.innerHTML = `Mode: <strong>${mode || '-'}</strong>`; }
  function setDayPill(state){ dayPill.innerHTML = `Vandaag: <strong>${state || 'nieuw'}</strong>`; }
  function setWakePill(on){ wakePill.innerHTML = `Wake Lock: <strong>${on ? 'aan' : 'uit'}</strong>`; }
  function fmt(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  }
  function fmtMin(sec){ return sec ? Math.round(sec/60) + " min" : "-"; }

  function loadDay(){
    const a = loadJSON(LS_DAY);
    if(!a || a.day !== todayKey() || !Array.isArray(a.stages)) return null;
    return a;
  }
  function saveDay(day){ saveJSON(LS_DAY, day); }
  function loadLast(){ return loadJSON(LS_LAST) || { nextClubIndex:0, decompBag:[], standaloneBag:[], nextDayType:'clubbell' }; }
  function saveLast(v){ saveJSON(LS_LAST, v); }

  function isYesterday(dateStr){
    if(!dateStr) return false;
    const d = new Date();
    const y = new Date(d);
    y.setDate(d.getDate() - 1);
    const yKey = y.getFullYear() + "-" + String(y.getMonth()+1).padStart(2,"0") + "-" + String(y.getDate()).padStart(2,"0");
    return dateStr === yKey;
  }

  function nextFullClubType(){
    const last = loadLast();
    const idx = Number.isInteger(last.nextClubIndex) ? last.nextClubIndex : 0;
    const clubType = CLUB_ROTATION[idx % CLUB_ROTATION.length];
    return { clubType, nextIndex: (idx + 1) % CLUB_ROTATION.length };
  }

  function nextDecompFlow(){
    const last = loadLast();
    let bag = Array.isArray(last.decompBag) ? last.decompBag.slice() : [];
    if(!bag.length){
      bag = shuffle(DECOMP_FLOWS.map(x => x.id));
    }
    const flowId = bag.shift();
    last.decompBag = bag;
    saveLast(last);
    return DECOMP_FLOWS.find(x => x.id === flowId) || DECOMP_FLOWS[0];
  }

  function nextStandaloneFlow(){
    const last = loadLast();
    let bag = Array.isArray(last.standaloneBag) ? last.standaloneBag.slice() : [];
    if(!bag.length){
      bag = shuffle(STANDALONE_FLOWS.map(x => x.id));
    }
    const flowId = bag.shift();
    last.standaloneBag = bag;
    saveLast(last);
    return STANDALONE_FLOWS.find(x => x.id === flowId) || STANDALONE_FLOWS[0];
  }



function generateClubExercises(clubType){
  const sequence = [];
  const chosenExercises = [];
  const usedNames = [];
  let currentPosition = "ready";

  const rhythmicPool = clubPool("Rhythmic", clubType);
  const ballisticPool = clubPool("Ballistic", clubType);
  const grindingPool = clubPool("Grinding", clubType);

  const rhythmicPick = pickClubExercise(rhythmicPool, currentPosition, usedNames);
  if(rhythmicPick){
    sequence.push({
      type:"exercise",
      bucket:rhythmicPick.bucket,
      exercise:rhythmicPick.name,
      start:rhythmicPick.start,
      end:rhythmicPick.end
    });
    chosenExercises.push({ bucket: rhythmicPick.bucket, exercise: rhythmicPick.name, start: rhythmicPick.start, end: rhythmicPick.end });
    usedNames.push(rhythmicPick.name);
    currentPosition = rhythmicPick.end;
  }

  const ballisticPick = pickClubExercise(ballisticPool, currentPosition, usedNames);
  if(ballisticPick){
    const bridge = clubBridge(currentPosition, ballisticPick.start);
    if(bridge) sequence.push(bridge);
    sequence.push({
      type:"exercise",
      bucket:ballisticPick.bucket,
      exercise:ballisticPick.name,
      start:ballisticPick.start,
      end:ballisticPick.end
    });
    chosenExercises.push({ bucket: ballisticPick.bucket, exercise: ballisticPick.name, start: ballisticPick.start, end: ballisticPick.end });
    usedNames.push(ballisticPick.name);
    currentPosition = ballisticPick.end;
  }

  if(Math.random() > 0.25){
    const grindingPick = pickClubExercise(grindingPool, currentPosition, usedNames);
    if(grindingPick){
      const bridge = clubBridge(currentPosition, grindingPick.start);
      if(bridge) sequence.push(bridge);
      sequence.push({
        type:"exercise",
        bucket:grindingPick.bucket,
        exercise:grindingPick.name,
        start:grindingPick.start,
        end:grindingPick.end
      });
      chosenExercises.push({ bucket: grindingPick.bucket, exercise: grindingPick.name, start: grindingPick.start, end: grindingPick.end });
      usedNames.push(grindingPick.name);
      currentPosition = grindingPick.end;
    }
  }

  return {
    exercises: chosenExercises,
    sequence,
    flow: sequence.map(x => x.type === "bridge" ? `[${x.label}]` : x.exercise).join(" -> "),
    endPosition: currentPosition
  };
}

  function buildStages(session){
    const stages = [];
    if(session.dayType === 'clubbell'){
      stages.push({ key:'club', label:`Clubbell - ${fmtMin(session.blockTimes.club)}`, seconds:session.blockTimes.club });
      stages.push({ key:'decomp', label:`Decompress flow - ${fmtMin(session.blockTimes.decomp)}`, seconds:session.blockTimes.decomp });
    } else if(session.dayType === 'standalone'){
      stages.push({ key:'active', label:`Stand-alone flow - ${fmtMin(session.blockTimes.active)}`, seconds:session.blockTimes.active });
      stages.push({ key:'decomp', label:`Decompress flow - ${fmtMin(session.blockTimes.decomp)}`, seconds:session.blockTimes.decomp });
    }
    return stages;
  }

  function generateSession(mode, total){
    const last = loadLast();
    const band = computeBand(total);
    const dayType = last.nextDayType === 'standalone' ? 'standalone' : 'clubbell';

    const session = {
      day: todayKey(),
      total,
      modeRequested: mode,
      mode: band.intuOnly ? 'INTU ONLY' : (dayType === 'clubbell' ? 'CLUBBELL DAY' : 'STAND-ALONE FLOW DAY'),
      dayType,
      intuOnly: band.intuOnly,
      delayedPlannedDay: band.intuOnly,
      intu: intu.slice(),
      club: null,
      activeFlow: null,
      decompFlow: null,
      blockTimes: { intu: 8 * 60, club: 0, active: 0, decomp: 0 },
      stages: [],
      currentStageIndex: 0,
      currentStageLeft: 0,
      isRunning: false,
      lastCountdownBeep: null
    };

    if(band.intuOnly){
      saveLast({
        nextClubIndex: last.nextClubIndex || 0,
        decompBag: Array.isArray(last.decompBag) ? last.decompBag : [],
        standaloneBag: Array.isArray(last.standaloneBag) ? last.standaloneBag : [],
        nextDayType: dayType
      });
    } else if(dayType === 'clubbell'){
      const next = nextFullClubType();
      const clubType = next.clubType;
      const clubPlan = generateClubExercises(clubType);
      const flow = nextDecompFlow();
      session.club = {
        clubType,
        exercises: clubPlan.exercises,
        sequence: clubPlan.sequence,
        flow: clubPlan.flow,
        endPosition: clubPlan.endPosition
      };
      session.decompFlow = {
        id: flow.id,
        name: flow.name,
        focus: flow.focus,
        use: flow.use,
        sequence: flow.sequence.slice(),
        bagType: 'Decompressie'
      };
      session.blockTimes.club = band.minutes * 60;
      session.blockTimes.decomp = (band.minutes === 20 ? 10 : 5) * 60;
      const lastState = loadLast();
      saveLast({
        nextClubIndex: next.nextIndex,
        decompBag: Array.isArray(lastState.decompBag) ? lastState.decompBag : [],
        standaloneBag: Array.isArray(lastState.standaloneBag) ? lastState.standaloneBag : [],
        nextDayType: 'standalone'
      });
    } else {
      const activeFlow = nextStandaloneFlow();
      const decompFlow = nextDecompFlow();
      session.activeFlow = {
        id: activeFlow.id,
        name: activeFlow.name,
        focus: activeFlow.focus,
        use: activeFlow.use,
        sequence: activeFlow.sequence.slice(),
        bagType: 'Stand-alone'
      };
      session.decompFlow = {
        id: decompFlow.id,
        name: decompFlow.name,
        focus: decompFlow.focus,
        use: decompFlow.use,
        sequence: decompFlow.sequence.slice(),
        bagType: 'Decompressie'
      };
      session.blockTimes.active = band.minutes * 60;
      session.blockTimes.decomp = (band.minutes === 20 ? 10 : 5) * 60;
      const lastState = loadLast();
      saveLast({
        nextClubIndex: last.nextClubIndex || 0,
        decompBag: Array.isArray(lastState.decompBag) ? lastState.decompBag : [],
        standaloneBag: Array.isArray(lastState.standaloneBag) ? lastState.standaloneBag : [],
        nextDayType: 'clubbell'
      });
    }

    session.stages = buildStages(session);
    session.currentStageLeft = session.stages.length ? session.stages[0].seconds : 0;

    saveDay(session);
    return session;
  }

  function renderRightNone(){
    rightInner.innerHTML = `<h2>Status</h2><p class="small">Geen actieve timer.</p>`;
  }

  function renderRightPanel(){
    const s = loadDay();
    if(!s || !Array.isArray(s.stages)){
      renderRightNone();
      return;
    }
    const current = getCurrentStage(s);
    const next = s.stages[s.currentStageIndex + 1] || null;

    rightInner.innerHTML = `
      <h2>Bloktimer</h2>
      <div class="label">Huidig blok</div>
      <div class="stage-title">${current ? current.label : "-"}</div>
      <div id="timeDisplay" class="time">${fmt(s.currentStageLeft || 0)}</div>

      <div class="row" style="margin-top:12px;">
        <button id="btnPlayPause" class="btn primary">${s.isRunning ? "Pauze" : "Start"}</button>
        <button id="btnNextStage" class="btn">Volgend blok</button>
        <button id="btnResetTimer" class="btn danger">Reset blokken</button>
      </div>

      <div class="exercise" style="margin-top:12px;">
        <div class="ex-left">
          <div class="ex-title">Volgende</div>
          <div class="ex-meta">${next ? next.label : "Na dit blok ben je klaar."}</div>
        </div>
        <div class="pill">${next ? "Hierna" : "Laatste"}</div>
      </div>

      <div class="timeline">
        ${s.stages.map((st, idx) => {
          let cls = "";
          if(idx < s.currentStageIndex) cls = "done";
          else if(idx === s.currentStageIndex) cls = "active";
          return `<div class="stage-pill ${cls}">
            <span>${st.label}</span>
            <strong>${idx < s.currentStageIndex ? "OK" : idx === s.currentStageIndex ? fmt(s.currentStageLeft) : fmt(st.seconds)}</strong>
          </div>`;
        }).join("")}
      </div>

      <div class="small" style="margin-top:12px;">Duidelijke beeps op 3-2-1, blokwissel en einde. Wake Lock probeert je scherm actief te houden tijdens het lopen.</div>
    `;

    document.getElementById("btnPlayPause").onclick = () => {
      const d = loadDay();
      if(!d) return;
      if(d.isRunning) pauseSequence();
      else startSequence();
    };
    document.getElementById("btnNextStage").onclick = () => advanceStage(true);
    document.getElementById("btnResetTimer").onclick = resetSequence;
  }

  async function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended"){
      await audioCtx.resume();
    }
  }

  async function beep(freq=880, duration=0.12, volume=0.06){
    try{
      await ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
  }

  async function patternCountdown(n){
    const map = {3:740,2:840,1:980};
    await beep(map[n] || 880, 0.14, 0.08);
  }
  async function patternStageChange(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.14,0.08), 150);
  }
  async function patternDone(){
    await beep(880,0.12,0.08);
    setTimeout(() => beep(1175,0.12,0.08), 150);
    setTimeout(() => beep(1568,0.18,0.08), 300);
  }

  async function acquireWakeLock(){
    try{
      if("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
        setWakePill(true);
        wakeLock.addEventListener("release", () => setWakePill(false));
      }
    } catch(e){
      setWakePill(false);
    }
  }
  async function releaseWakeLock(){
    try{
      if(wakeLock){
        await wakeLock.release();
        wakeLock = null;
      }
    } catch(e){}
    setWakePill(false);
  }

  document.addEventListener("visibilitychange", async () => {
    const s = loadDay();
    if(document.visibilityState === "visible" && s?.isRunning){
      await acquireWakeLock();
    }
  });

  function startTick(){
    if(timer) clearInterval(timer);
    timer = setInterval(async () => {
      const d = loadDay();
      if(!d || !d.isRunning) return;
      const cur = getCurrentStage(d);
      if(!cur) return;

      if(d.currentStageLeft > 0){
        d.currentStageLeft -= 1;

        if([3,2,1].includes(d.currentStageLeft) && d.lastCountdownBeep !== d.currentStageLeft){
          d.lastCountdownBeep = d.currentStageLeft;
          saveDay(d);
          renderRightPanel();
          await patternCountdown(d.currentStageLeft);
          return;
        }
      }

      if(d.currentStageLeft <= 0){
        d.isRunning = false;
        saveDay(d);
        renderRightPanel();
        await advanceStage(false);
        return;
      }

      saveDay(d);
      renderRightPanel();
    }, 1000);
  }

  async function startSequence(){
    const d = loadDay();
    if(!d) return;
    d.isRunning = true;
    d.lastCountdownBeep = null;
    saveDay(d);
    await ensureAudio();
    await acquireWakeLock();
    renderRightPanel();
    startTick();
  }

  async function pauseSequence(){
    const d = loadDay();
    if(!d) return;
    d.isRunning = false;
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  async function advanceStage(manual){
    const d = loadDay();
    if(!d) return;
    const atLast = d.currentStageIndex >= d.stages.length - 1;

    if(atLast){
      d.isRunning = false;
      saveDay(d);
      if(timer) clearInterval(timer);
      timer = null;
      renderRightPanel();
      await releaseWakeLock();
      await patternDone();
      return;
    }

    d.currentStageIndex += 1;
    d.currentStageLeft = d.stages[d.currentStageIndex].seconds;
    d.lastCountdownBeep = null;
    if(!manual) d.isRunning = true;
    saveDay(d);
    renderRightPanel();
    await patternStageChange();

    if(manual){
      d.isRunning = false;
      saveDay(d);
      renderRightPanel();
    } else {
      startTick();
    }
  }

  async function resetSequence(){
    const d = loadDay();
    if(!d) return;
    d.currentStageIndex = 0;
    d.currentStageLeft = d.stages.length ? d.stages[0].seconds : 0;
    d.isRunning = false;
    d.lastCountdownBeep = null;
    saveDay(d);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    renderRightPanel();
  }

  function renderGate(existing){
    const _raw = existing?.scores ?? { soreness:null, energy:null, sleep:null };
    const scores = { soreness:_raw.soreness, energy:_raw.energy, sleep:_raw.sleep };

    leftCard.innerHTML = `
      <h2>Recovery Gate</h2>
      <div class="gate-grid">
        ${gateDef.map(g => `
          <div class="gate-row">
            <div class="label">${g.label}</div>
            <div class="score-row" data-gkey="${g.key}">
              ${[0,1,2,3,4,5].map(n => `<div class="score-btn" data-score="${n}">${n}</div>`).join('')}
            </div>
            <div class="score-label" id="lbl-${g.key}">-</div>
          </div>
        `).join('')}
        <div class="total">
          <div>
            <div class="label">Totaal</div>
            <div class="n" id="totalN">0</div>
          </div>
          <div id="band" class="badge">-</div>
        </div>
        <div class="row">
          <button id="btnGenerate" class="btn primary" disabled>Genereer sessie</button>
          <span class="small">0-8 = alleen Intu, 9-12 = 15 min, 13-15 = 20 min</span>
        </div>
      </div>
    `;

    const totalEl = document.getElementById('totalN');
    const bandEl = document.getElementById('band');
    const btnGenerate = document.getElementById('btnGenerate');

    function updateUI(){
      const vals = Object.values(scores);
      const complete = vals.every(v => typeof v === 'number');
      const total = vals.reduce((a,b) => a + (typeof b==='number' ? b : 0), 0);
      totalEl.textContent = String(total);
      const b = computeBand(total);
      bandEl.className = `badge ${b.cls}`;
      bandEl.textContent = b.label;
      gateDef.forEach(g => {
        const v = scores[g.key];
        const el = document.getElementById(`lbl-${g.key}`);
        el.textContent = typeof v === 'number' ? g.choices[v] : '-';
      });
      btnGenerate.disabled = !complete;
    }

    document.querySelectorAll('.score-row').forEach(row => {
      row.addEventListener('click', (e) => {
        const t = e.target;
        if(!t.classList.contains('score-btn')) return;
        const key = row.dataset.gkey;
        const v = Number(t.dataset.score);
        scores[key] = v;
        row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        updateUI();
      });
    });

    btnGenerate.onclick = () => {
      const total = Object.values(scores).reduce((a,b)=>a+b,0);
      const band = computeBand(total).band;
      const session = generateSession(band, total);
      renderSession(session);
    };



    updateUI();
    renderRightNone();
    setModePill("-");
    setDayPill("nieuw");
  }

  function boot(){
    const day = loadDay();
    if(day){
      btnMain.textContent = "Open sessie";
      renderSession(day);
    } else {
      btnMain.textContent = "Start";
      renderGate(null);
    }
  }

  btnMain.onclick = boot;
  btnReset.onclick = async () => {
    localStorage.removeItem(LS_DAY);
    if(timer) clearInterval(timer);
    timer = null;
    await releaseWakeLock();
    boot();
  };


  setWakePill(false);
  boot();
})();
</script>
</body>
</html>
